<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="theme-color" content="#ffffff">
<title>工作水印相机</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;600;700&family=JetBrains+Mono:wght@500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#f2f3f5;
  --surface:#ffffff;
  --surface-2:#f8f9fa;
  --surface-3:#f1f3f5;
  --border:#e5e7eb;
  --fg:#1f2937;
  --fg-2:#374151;
  --fg-3:#6b7280;
  --muted:#9ca3af;
  --accent:#2563eb;
  --accent-hi:#3b82f6;
  --accent-soft:rgba(37,99,235,0.08);
  --danger:#ef4444;
  --shadow-sm:0 1px 2px 0 rgba(0,0,0,0.05);
  --shadow:0 4px 6px -1px rgba(0,0,0,0.1), 0 2px 4px -1px rgba(0,0,0,0.06);
  --safe-top:env(safe-area-inset-top,0px);
  --safe-bottom:env(safe-area-inset-bottom,0px);
}

*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden}
body{
  font-family:'Noto Sans SC',-apple-system,BlinkMacSystemFont,sans-serif;
  background:var(--bg);color:var(--fg);
  -webkit-font-smoothing:antialiased;
  user-select:none;-webkit-user-select:none;
}
.mono{font-family:'JetBrains Mono',monospace}

.view{position:fixed;inset:0;display:none;flex-direction:column}
.view.active{display:flex}

/* ================= 拍摄页 ================= */
#cameraView{background:#000;z-index:1}
#cameraView .preview-container{
  flex:1;position:relative;overflow:hidden;
  display:flex;align-items:center;justify-content:center;
}
#cameraVideo{width:100%;height:100%;object-fit:cover;transform:scaleX(-1);}
#cameraCanvas{display:none}

.grid-overlay{
  position:absolute;inset:0;pointer-events:none;
  background-image:
    linear-gradient(to right,rgba(255,255,255,0.15) 1px,transparent 1px),
    linear-gradient(to bottom,rgba(255,255,255,0.15) 1px,transparent 1px);
  background-size:33.33% 33.33%;
}

.camera-topbar{
  position:absolute;top:0;left:0;right:0;
  padding:calc(12px + var(--safe-top)) 16px 12px;
  background:linear-gradient(to bottom,rgba(0,0,0,0.6),transparent);
  display:flex;justify-content:space-between;align-items:center;
  z-index:10;
}
.top-info{display:flex;flex-direction:column;gap:2px;min-width: 0;}
.top-time{color:#fff;font-size:15px;font-weight:600;font-family:'JetBrains Mono',monospace;letter-spacing:0.02em}
.top-loc{color:rgba(255,255,255,0.8);font-size:11px;display:flex;align-items:center;gap:4px; cursor: pointer; transition: opacity 0.2s; padding: 2px 0;}
.top-loc:active{opacity: 0.6;}
.top-loc.waiting{color:rgba(255,255,255,0.5)}
.loc-dot{width:6px;height:6px;border-radius:50%;background:var(--accent-hi);animation:pulse 1.5s infinite}
.loc-dot.fixed{background:#10b981;animation:none}
@keyframes pulse{0%,100%{opacity:0.4}50%{opacity:1}}

.camera-topbtns{display:flex;gap:8px}
.top-btn{
  width:36px;height:36px;border-radius:50%;
  background:rgba(255,255,255,0.15);backdrop-filter:blur(12px);
  border:none;color:#fff;display:flex;align-items:center;justify-content:center;
  cursor:pointer;transition:all 0.15s;
}
.top-btn:active{transform:scale(0.92);background:rgba(255,255,255,0.25)}

.camera-bottombar{
  background:#000;padding:20px 20px calc(20px + var(--safe-bottom));
  display:flex;align-items:center;justify-content:space-around;z-index:10;
}
.shutter-wrap{position:relative;display:flex;align-items:center;justify-content:center}
.shutter{
  width:72px;height:72px;border-radius:50%;
  background:#fff;border:4px solid #fff;
  box-shadow:0 0 0 3px rgba(255,255,255,0.3);
  cursor:pointer;transition:all 0.15s;position:relative;
}
.shutter::after{content:'';position:absolute;inset:4px;border-radius:50%;background:#fff;transition:all 0.15s;}
.shutter:active::after{background:#ddd;transform:scale(0.9)}

.bottom-action{display:flex;flex-direction:column;align-items:center;gap:6px;color:rgba(255,255,255,0.8);font-size:11px;cursor:pointer;}
.bottom-action:active{color:#fff}
.bottom-action .icon-circle{
  width:48px;height:48px;border-radius:50%;
  background:rgba(255,255,255,0.1);
  display:flex;align-items:center;justify-content:center;transition:all 0.15s;
}
.bottom-action:active .icon-circle{background:rgba(255,255,255,0.2);transform:scale(0.92)}

.flash{position:absolute;inset:0;background:#fff;z-index:100;opacity:0;pointer-events:none}
.flash.active{animation:flashAnim 0.4s ease-out}
@keyframes flashAnim{0%{opacity:0}15%{opacity:1}100%{opacity:0}}

.permission-prompt{
  position:absolute;inset:0;background:#000;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:16px;padding:40px;text-align:center;z-index:50;
}
.permission-prompt svg{color:var(--muted)}
.permission-prompt h3{color:#fff;font-size:18px;font-weight:600}
.permission-prompt p{color:var(--muted);font-size:13px;line-height:1.6;max-width:280px}
.permission-btn{
  padding:12px 32px;background:var(--accent);color:#fff;
  border:none;border-radius:24px;font-size:15px;font-weight:600;
  font-family:inherit;cursor:pointer;margin-top:8px;
}

/* ================= 编辑页 ================= */
#editorView{background:var(--bg);z-index:2}

/* 1. 顶部全局功能区 */
.global-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: calc(12px + var(--safe-top)) 16px 12px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
  height: 56px;
  z-index: 10;
}
.header-btn {
  background: none; border: none; font-family: inherit; font-size: 16px;
  color: var(--fg-2); cursor: pointer; padding: 8px 12px; display: flex; align-items: center; gap: 4px;
  transition: color 0.2s;
}
.header-btn:active{opacity: 0.6}
.header-btn.save { color: var(--accent); font-weight: 600; }

/* 通用板块样式 */
.section-block {
  background: var(--surface);
  margin-bottom: 8px;
  flex-shrink: 0;
  box-shadow: var(--shadow-sm);
}
.section-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 12px 16px;
  background: var(--surface-2);
  border-bottom: 1px solid var(--border);
  position: relative;
  z-index: 5;
}
.section-title {
  font-size: 15px;
  font-weight: 600;
  color: var(--fg-2);
  display: flex;
  align-items: center;
}
.section-title::before {
  content: '';
  width: 3px;
  height: 14px;
  background: var(--accent);
  border-radius: 2px;
  margin-right: 8px;
}

/* 第一部分：预览 */
.preview-content-wrapper {
  background: #e5e7eb;
  width: 100%;
  overflow: hidden;
  transition: height 0.3s cubic-bezier(0.4, 0.0, 0.2, 1), padding 0.3s;
  position: relative;
}
/* 折叠状态样式：确保不留空隙 */
.preview-content-wrapper.collapsed {
  height: 0 !important;
  padding: 0 !important;
}

.preview-frame{
  width: 100%;
  height: 100%;
  display:flex;
  align-items:center;
  justify-content:center;
  overflow: hidden;
  padding: 16px;
}
.preview-frame canvas{
  max-height:100%;
  max-width:100%;
  width:auto;
  height:auto;
  box-shadow:var(--shadow);
  border-radius:8px;
  object-fit: contain;
  background:#fff;
}
.section-toggle-btn {
  background: none; border: none;
  color: var(--accent);
  cursor: pointer;
  padding: 6px;
  display: flex;
  align-items: center;
  justify-content: center;
}
.section-toggle-btn svg { width: 20px; height: 20px; transition: transform 0.3s; }
.section-toggle-btn.collapsed svg { transform: rotate(180deg); }

/* 第二部分：拍摄信息 */
.info-content {
  flex: 1;
  min-height: 0;
  background: var(--surface);
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  padding: 0 0 calc(20px + var(--safe-bottom));
  margin-bottom: 0;
  box-shadow: none;
  border-top-left-radius: 16px;
  border-top-right-radius: 16px;
  margin-top: 8px;
  display: flex;
  flex-direction: column;
}

.field{padding: 16px 16px 8px; border-bottom: 1px solid var(--surface-2);}
.field:last-child{border-bottom: none;}
.field-label{font-size:12px;color:var(--fg-3);font-weight:500;margin-bottom:8px;display:flex;align-items:center;justify-content:space-between;}
.field-label .auto-tag{font-size:10px;color:var(--accent);background:var(--accent-soft);padding:2px 8px;border-radius:10px;}

/* 输入框 */
input[type="text"],input[type="number"],textarea{
  width:100%;background:var(--bg);border:1px solid transparent;border-radius:8px;
  padding:10px 12px;font-family:inherit;font-size:14px;color:var(--fg);outline:none;transition:all 0.2s;
}
input:focus,textarea:focus{
  background:var(--surface);
  border-color:var(--accent);
  box-shadow:0 0 0 3px var(--accent-soft);
}
textarea{resize:none;line-height:1.5;height: 60px;}

.btn-inline{
  padding:4px 10px;background:var(--surface-2);border:1px solid var(--border);border-radius:6px;
  font-family:inherit;font-size:11px;color:var(--fg-2);cursor:pointer;white-space:nowrap;display:flex;align-items:center;gap:4px;
}
.btn-inline:active{background:var(--surface-3)}

.field-grid-2{display:grid;grid-template-columns:1fr 1fr;gap:10px}

.type-chips{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:8px;}
.type-chip{
  padding:6px 14px;background:var(--surface-2);border:1px solid var(--border);border-radius:16px;
  font-size:12px;color:var(--fg-2);cursor:pointer;transition:all 0.2s;
}
.type-chip:active{transform:scale(0.96)}
.type-chip.active{background:var(--accent);border-color:var(--accent);color:#fff;font-weight:500;}

/* Toast 居中显示 */
.toast{
  position:fixed;top:50%;left:50%;transform:translate(-50%, -50%) translateY(20px);
  background:rgba(31,41,55,0.95);backdrop-filter:blur(12px);color:#fff;padding:12px 24px;border-radius:24px;
  font-size:14px;z-index:1000;opacity:0;transition:all 0.3s;pointer-events:none;box-shadow:var(--shadow);max-width:80%;text-align:center;
}
.toast.show{opacity:1;transform:translate(-50%, -50%) translateY(0)}
.toast.error{background:rgba(239,68,68,0.95)}
.toast.success{background:rgba(16,185,129,0.95)}

.save-overlay{
  position:fixed;inset:0;background:rgba(0,0,0,0.85);backdrop-filter:blur(8px);z-index:999;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  opacity:0;pointer-events:none;transition:opacity 0.2s;padding:20px;
}
.save-overlay.show{opacity:1;pointer-events:auto}
.save-overlay .hint-text{color:#fff;font-size:16px;margin-bottom:20px;text-align:center;font-weight:500;}
.save-overlay .hint-sub{color:rgba(255,255,255,0.6);font-size:13px;margin-bottom:24px;text-align:center;}
.save-preview-img{max-width:80%;max-height:50vh;border-radius:12px;box-shadow:0 8px 32px rgba(0,0,0,0.5);}
.save-actions{margin-top:32px;display:flex;gap:12px; flex-direction: column; width: 80%; max-width: 300px;}
.save-actions button{padding:14px 24px;border-radius:12px;border:none;font-family:inherit;font-size:16px;font-weight:600;cursor:pointer; width: 100%;}
.btn-secondary{background:rgba(255,255,255,0.15);color:#fff}
.btn-primary{background:var(--accent);color:#fff}

.icon{width:22px;height:22px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.icon-sm{width:18px;height:18px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}

@media(min-width:600px){
  #cameraView .preview-container{max-width:420px;margin:0 auto}
  .camera-bottombar{max-width:420px;margin:0 auto}
  .camera-topbar{max-width:420px;margin:0 auto;left:50%;transform:translateX(-50%);right:auto;width:100%}
  .section-block{max-width:600px;margin: 8px auto; border-radius: 12px;}
}
</style>
</head>
<body>

<div class="view active" id="cameraView">
  <div class="preview-container">
    <video id="cameraVideo" autoplay playsinline muted></video>
    <canvas id="cameraCanvas"></canvas>
    <div class="grid-overlay" id="gridOverlay" style="display:none;"></div>
    <div class="flash" id="flash"></div>

    <div class="camera-topbar">
      <div class="top-info">
        <div class="top-time" id="liveTime">--:--</div>
        <div class="top-loc waiting" id="topLoc" title="点击刷新定位">
          <span class="loc-dot" id="locDot"></span>
          <span id="locText">点击开启摄像头时获取定位</span>
        </div>
      </div>
      <div class="camera-topbtns">
        <button class="top-btn" id="gridBtn" title="网格线" aria-label="切换网格线">
          <svg class="icon" viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
        </button>
        <button class="top-btn" id="switchCameraBtn" title="切换摄像头" aria-label="切换摄像头">
          <svg class="icon" viewBox="0 0 24 24"><path d="M23 4v6h-6"/><path d="M1 20v-6h6"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10"/><path d="M20.49 15a9 9 0 0 1-14.85 3.36L1 14"/></svg>
        </button>
      </div>
    </div>

    <div class="permission-prompt" id="permissionPrompt">
      <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/>
        <circle cx="12" cy="13" r="4"/>
      </svg>
      <h3>需要摄像头权限</h3>
      <p>请允许使用摄像头和位置权限，以便拍摄带水印的工作照片</p>
      <button class="permission-btn" id="enableCameraBtn">开启摄像头</button>
    </div>
  </div>

  <div class="camera-bottombar">
    <div class="bottom-action" id="albumBtn">
      <div class="icon-circle">
        <svg class="icon" viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
      </div>
      <span>相册</span>
    </div>
    <div class="shutter-wrap">
      <button class="shutter" id="shutterBtn"></button>
    </div>
    <div class="bottom-action" id="manualUploadBtn">
      <div class="icon-circle">
        <svg class="icon" viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
      </div>
      <span>原生相机</span>
    </div>
  </div>
</div>

<div class="view" id="editorView">
  <div class="global-header">
    <button class="header-btn back" id="editorBackBtn">返回</button>
    <button class="header-btn save" id="editorSaveBtn">保存</button>
  </div>

  <div class="section-block">
    <div class="section-header">
      <div class="section-title">照片预览</div>
      <button class="section-toggle-btn" id="previewToggleBtn" title="收起/展开预览" aria-label="收起或展开预览">
        <svg class="icon" viewBox="0 0 24 24"><polyline points="6 9 12 15 18 9"/></svg>
      </button>
    </div>
    <div class="preview-content-wrapper" id="previewContent">
      <div class="preview-frame">
        <canvas id="resultCanvas"></canvas>
      </div>
    </div>
  </div>

  <div class="section-block info-content">
    <div class="section-header" style="position:sticky; top:0; z-index:2; background:var(--surface);">
      <div class="section-title">拍摄信息</div>
    </div>

    <div class="field">
      <div class="field-label"><span>拍摄时间</span><span class="auto-tag">自动获取</span></div>
      <input type="text" id="inputTime" placeholder="2024.01.15 周一 14:30">
    </div>

    <div class="field">
      <div class="field-label"><span>照片类型</span></div>
      <div class="type-chips" id="typePicker">
        <div class="type-chip active" data-type="现场核查">现场核查</div>
        <div class="type-chip" data-type="进度汇报">进度汇报</div>
        <div class="type-chip" data-type="问题记录">问题记录</div>
        <div class="type-chip" data-type="竣工验收">竣工验收</div>
      </div>
      <input type="text" id="inputType" value="现场核查" placeholder="请输入照片类型">
    </div>

    <div class="field">
      <div class="field-label">
        <span>详细地址</span>
        <button class="btn-inline" id="refreshLocBtn">
          <svg class="icon-sm" viewBox="0 0 24 24"><path d="M21 12a9 9 0 1 1-9-9c2.52 0 4.85.83 6.72 2.23"/><path d="M21 3v6h-6"/></svg>
          刷新定位
        </button>
      </div>
      <textarea id="inputLocation" placeholder="请输入详细地址..." rows="2"></textarea>
      <div id="locError" style="color: var(--danger); font-size: 12px; margin-top: 6px; display: none;">
        *自动获取地址失败，请手动输入
      </div>
    </div>

    <div class="field">
      <div class="field-label"><span>经纬度</span></div>
      <div class="field-grid-2">
        <input type="text" id="inputLat" inputmode="decimal" placeholder="纬度">
        <input type="text" id="inputLng" inputmode="decimal" placeholder="经度">
      </div>
    </div>

    <div class="field">
      <div class="field-label"><span>手机型号</span></div>
      <input type="text" id="inputDevice" value="iPhone 13 Pro" placeholder="例如：iPhone 13 Pro">
    </div>

    <div class="field">
      <div class="field-label"><span>备注信息（选填）</span></div>
      <input type="text" id="inputNote" placeholder="如：施工区域A">
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<div class="save-overlay" id="saveOverlay">
  <div class="hint-text">保存图片</div>
  <div class="hint-sub">若系统无法直接保存，请长按下方图片</div>
  <img id="savePreviewImg" class="save-preview-img" alt="预览图">
  <div class="save-actions">
    <button class="btn-primary" id="directDownloadBtn">下载图片</button>
    <button class="btn-secondary" id="saveCloseBtn">关闭</button>
  </div>
</div>

<input type="file" id="fileInput" accept="image/*" style="display:none;">
<input type="file" id="cameraInput" accept="image/*" capture="environment" style="display:none;">

<script>
// ================= 配置区 =================
const AMAP_KEY = 'aa30998599ef699354a51a1236aa6946'; 
// ==========================================

// WGS84转GCJ02
const PI = 3.1415926535897932384626;
const a = 6378245.0;
const ee = 0.00669342162296594323;

function transformLat(x, y) {
  let ret = -100.0 + 2.0 * x + 3.0 * y + 0.2 * y * y + 0.1 * x * y + 0.2 * Math.sqrt(Math.abs(x));
  ret += (20.0 * Math.sin(6.0 * x * PI) + 20.0 * Math.sin(2.0 * x * PI)) * 2.0 / 3.0;
  ret += (20.0 * Math.sin(y * PI) + 40.0 * Math.sin(y / 3.0 * PI)) * 2.0 / 3.0;
  ret += (160.0 * Math.sin(y / 12.0 * PI) + 320.0 * Math.sin(y * PI / 30.0)) * 2.0 / 3.0;
  return ret;
}

function transformLng(x, y) {
  let ret = 300.0 + x + 2.0 * y + 0.1 * x * x + 0.1 * x * y + 0.1 * Math.sqrt(Math.abs(x));
  ret += (20.0 * Math.sin(6.0 * x * PI) + 20.0 * Math.sin(2.0 * x * PI)) * 2.0 / 3.0;
  ret += (20.0 * Math.sin(x * PI) + 40.0 * Math.sin(x / 3.0 * PI)) * 2.0 / 3.0;
  ret += (150.0 * Math.sin(x / 12.0 * PI) + 300.0 * Math.sin(x / 30.0 * PI)) * 2.0 / 3.0;
  return ret;
}

function wgs84ToGcj02(lng, lat) {
  let dLat = transformLat(lng - 105.0, lat - 35.0);
  let dLng = transformLng(lng - 105.0, lat - 35.0);
  const radLat = lat / 180.0 * PI;
  let magic = Math.sin(radLat);
  magic = 1 - ee * magic * magic;
  const sqrtMagic = Math.sqrt(magic);
  dLat = (dLat * 180.0) / ((a * (1 - ee)) / (magic * sqrtMagic) * PI);
  dLng = (dLng * 180.0) / (a / sqrtMagic * Math.cos(radLat) * PI);
  const mgLat = { lat: lat + dLat, lng: lng + dLng };
  return mgLat;
}

const state = {
  stream: null,
  facingMode: 'environment',
  capturedImage: null,
  geo: { lat: '', lng: '', accuracy: 0, address: '' },
  locationReady: false,
  device: { brand: '', model: '' },
  currentTypeChip: '现场核查',
  lastBlob: null,
  previewHeight: '35vh',
  isPreviewOpen: true,
  drawScheduled: false // RAF 节流状态
};

function haptic(style = 'light') {
  if (navigator.vibrate) {
    navigator.vibrate(style === 'heavy' ? 20 : 10);
  }
}

function jsonpRequest(url, timeout = 10000) {
  return new Promise((resolve, reject) => {
    const timer = setTimeout(() => reject(new Error('请求超时')), timeout);
    const callbackName = 'amap_jsonp_' + Date.now() + '_' + Math.floor(Math.random() * 10000);
    window[callbackName] = function(data) {
      clearTimeout(timer);
      resolve(data);
      delete window[callbackName];
      const script = document.getElementById(callbackName);
      if(script) document.head.removeChild(script);
    };
    const script = document.createElement('script');
    script.id = callbackName;
    script.src = url + (url.includes('?') ? '&' : '?') + 'callback=' + callbackName;
    script.onerror = (err) => { clearTimeout(timer); reject(new Error('JSONP请求失败')); };
    document.head.appendChild(script);
  });
}

async function init(){
  if (document.fonts) {
    await document.fonts.ready;
  }
  bindEvents();
  startLiveTime();
  initPreviewInteractions();
}

// ================= 预览切换逻辑 =================
function initPreviewInteractions() {
  const toggleBtn = document.getElementById('previewToggleBtn');
  toggleBtn.addEventListener('click', () => {
    togglePreview();
    haptic();
  });
}

function togglePreview() {
  const contentWrapper = document.getElementById('previewContent');
  const toggleBtn = document.getElementById('previewToggleBtn');

  if (state.isPreviewOpen) {
    contentWrapper.classList.add('collapsed');
    toggleBtn.classList.add('collapsed');
    state.isPreviewOpen = false;
  } else {
    contentWrapper.classList.remove('collapsed');
    toggleBtn.classList.remove('collapsed');
    // 展开时立即触发一次重绘，确保显示
    scheduleDraw();
    state.isPreviewOpen = true;
  }
}

function setPreviewHeight(vh) {
  const contentWrapper = document.getElementById('previewContent');
  const toggleBtn = document.getElementById('previewToggleBtn');
  
  contentWrapper.style.height = vh;
  state.previewHeight = vh;
  state.isPreviewOpen = true;
  contentWrapper.classList.remove('collapsed');
  toggleBtn.classList.remove('collapsed');
}

// RAF 节流重绘
function scheduleDraw() {
  if (!state.drawScheduled) {
    state.drawScheduled = true;
    requestAnimationFrame(() => {
      drawResult();
      state.drawScheduled = false;
    });
  }
}
// =================================================

function bindEvents(){
  document.getElementById('enableCameraBtn').addEventListener('click', () => {
    startCamera();       
    requestLocation();   
  });
  
  document.getElementById('topLoc').addEventListener('click', requestLocation);

  document.getElementById('shutterBtn').addEventListener('click', () => { haptic('heavy'); capture(); });
  document.getElementById('switchCameraBtn').addEventListener('click', () => { haptic('light'); switchCamera(); });
  document.getElementById('gridBtn').addEventListener('click', () => {
    const g = document.getElementById('gridOverlay');
    g.style.display = g.style.display === 'none' ? 'block' : 'none';
  });

  document.getElementById('albumBtn').addEventListener('click', () => document.getElementById('fileInput').click());
  document.getElementById('manualUploadBtn').addEventListener('click', () => document.getElementById('cameraInput').click());
  
  document.getElementById('fileInput').addEventListener('change', e => { if(e.target.files[0]) loadFromFile(e.target.files[0]); });
  document.getElementById('cameraInput').addEventListener('change', e => { if(e.target.files[0]) loadFromFile(e.target.files[0]); });

  document.getElementById('editorBackBtn').addEventListener('click', () => {
    switchView('cameraView');
  });
  
  document.getElementById('editorSaveBtn').addEventListener('click', saveImage);

  // 输入事件改用 RAF 节流
  ['inputTime','inputType','inputLocation','inputLat','inputLng','inputDevice','inputNote'].forEach(id => {
    document.getElementById(id).addEventListener('input', scheduleDraw);
  });

  document.getElementById('refreshLocBtn').addEventListener('click', requestLocation);
  
  document.getElementById('saveCloseBtn').addEventListener('click', () => document.getElementById('saveOverlay').classList.remove('show'));
  
  // 新增：直接下载按钮事件
  document.getElementById('directDownloadBtn').addEventListener('click', () => {
    if(state.lastBlob) triggerDownload(state.lastBlob);
  });

  const typePicker = document.getElementById('typePicker');
  if(typePicker) {
    typePicker.querySelectorAll('.type-chip').forEach(chip => {
      chip.addEventListener('click', () => {
        haptic('light');
        typePicker.querySelectorAll('.type-chip').forEach(c => c.classList.remove('active'));
        chip.classList.add('active');
        state.currentTypeChip = chip.dataset.type;
        document.getElementById('inputType').value = chip.dataset.type;
        scheduleDraw();
      });
    });
  }
  
  document.getElementById('inputType').addEventListener('input', e => {
    if(typePicker) {
      typePicker.querySelectorAll('.type-chip').forEach(c => c.classList.remove('active'));
    }
    scheduleDraw();
  });
}

function startLiveTime(){
  const update = () => {
    const now = new Date();
    const h = String(now.getHours()).padStart(2,'0');
    const m = String(now.getMinutes()).padStart(2,'0');
    document.getElementById('liveTime').textContent = `${h}:${m}`;
  };
  update();
  setInterval(update, 1000);
}

async function startCamera(){
  document.getElementById('permissionPrompt').style.display = 'none';
  try {
    state.stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: state.facingMode, width: { ideal: 1920 }, height: { ideal: 1080 } },
      audio: false
    });
    const video = document.getElementById('cameraVideo');
    video.srcObject = state.stream;
    video.style.transform = state.facingMode === 'user' ? 'scaleX(-1)' : 'none';
  } catch(err) {
    let msg = '无法访问摄像头，请检查权限或设备';
    if (err.name === 'NotAllowedError') msg = '摄像头权限被拒绝，请在系统设置中开启';
    else if (err.name === 'NotFoundError') msg = '未检测到摄像头设备';
    
    showToast(msg, 'error');
    document.getElementById('permissionPrompt').style.display = 'flex';
    // 更新提示文案引导用户
    const promptP = document.querySelector('.permission-prompt p');
    if(promptP) promptP.textContent = err.name === 'NotAllowedError' ? '请在系统设置中允许摄像头和位置权限后，刷新页面重试。' : '请检查设备连接后重试。';
  }
}

async function switchCamera(){
  if(!state.stream) return;
  state.stream.getTracks().forEach(t => t.stop());
  state.facingMode = state.facingMode === 'environment' ? 'user' : 'environment';
  await startCamera();
}

function capture(){
  const video = document.getElementById('cameraVideo');
  if(!video.videoWidth){ showToast('摄像头未就绪', 'error'); return; }

  const flash = document.getElementById('flash');
  flash.classList.remove('active');
  void flash.offsetWidth;
  flash.classList.add('active');

  const canvas = document.getElementById('cameraCanvas');
  const ctx = canvas.getContext('2d');
  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;

  if(state.facingMode === 'user'){
    ctx.translate(canvas.width, 0);
    ctx.scale(-1, 1);
  }
  ctx.drawImage(video, 0, 0);

  const dataUrl = canvas.toDataURL('image/jpeg', 0.95);
  const img = new Image();
  img.onload = () => { state.capturedImage = img; enterEditor(); };
  img.src = dataUrl;
}

function loadFromFile(file){
  const reader = new FileReader();
  reader.onload = e => {
    const img = new Image();
    img.onload = () => { state.capturedImage = img; enterEditor(); };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
}

async function requestLocation(){
  const locEl = document.getElementById('topLoc');
  const locText = document.getElementById('locText');
  const locDot = document.getElementById('locDot');
  const locError = document.getElementById('locError');

  if(!navigator.geolocation){ 
    locText.textContent = '不支持定位';
    return; 
  }

  locText.textContent = '正在定位...';
  locDot.classList.remove('fixed');
  locEl.classList.add('waiting');
  locDot.style.background = 'var(--accent-hi)';
  if(document.getElementById('locError')) {
    document.getElementById('locError').style.display = 'none';
  }

  if (navigator.permissions && navigator.permissions.query) {
    try {
      const status = await navigator.permissions.query({ name: 'geolocation' });
      if (status.state === 'denied') {
        locText.textContent = '定位权限被拒绝';
        locEl.classList.remove('waiting');
        if(document.getElementById('locError')) {
          const err = document.getElementById('locError');
          err.style.display = 'block';
          err.textContent = `*定位权限被拒绝，请在系统设置中开启`;
        }
        showToast('定位权限被拒绝，请在系统设置中开启', 'error');
        return;
      }
    } catch (err) {
      console.warn('权限查询失败:', err);
    }
  }

  navigator.geolocation.getCurrentPosition(
    pos => {
      const wgsLat = pos.coords.latitude;
      const wgsLng = pos.coords.longitude;
      
      const gcj02 = wgs84ToGcj02(wgsLng, wgsLat);
      
      state.geo.lat = gcj02.lat.toFixed(6);
      state.geo.lng = gcj02.lng.toFixed(6);
      state.geo.accuracy = pos.coords.accuracy;
      state.locationReady = true;

      locText.textContent = `${state.geo.lat}°, ${state.geo.lng}°`;
      locDot.classList.add('fixed');
      locEl.classList.remove('waiting');

      document.getElementById('inputLat').value = state.geo.lat;
      document.getElementById('inputLng').value = state.geo.lng;

      reverseGeocode(state.geo.lat, state.geo.lng);
    },
    err => {
      locText.textContent = '定位失败';
      locEl.classList.add('waiting');
      if(document.getElementById('locError')) {
        const errEl = document.getElementById('locError');
        errEl.style.display = 'block';
        errEl.textContent = `*自动获取地址失败`;
      }
      showToast('定位失败，请检查网络或权限', 'error');
    },
    { enableHighAccuracy: true, timeout: 10000, maximumAge: 0 }
  );
}

async function reverseGeocode(lat, lng){
  const locText = document.getElementById('locText');
  const locEl = document.getElementById('topLoc');
  const inputLoc = document.getElementById('inputLocation');
  const locError = document.getElementById('locError');

  try {
    const url = `https://restapi.amap.com/v3/geocode/regeo?output=JSON&location=${lng},${lat}&key=${AMAP_KEY}&radius=1000&extensions=all`;
    const data = await jsonpRequest(url);

    if(data.status === '1' && data.regeocode) {
      const regeocode = data.regeocode;
      let baseAddress = regeocode.formatted_address || '未知地点';
      let poiName = '';
      if(regeocode.pois && regeocode.pois.length > 0) {
        poiName = regeocode.pois[0].name; 
      }
      let finalAddress = baseAddress;
      if(poiName && !baseAddress.includes(poiName)) {
         finalAddress = `${baseAddress} (${poiName})`; 
      }
      state.geo.address = finalAddress;
      inputLoc.value = finalAddress;
      locEl.classList.remove('waiting');
      locText.textContent = finalAddress;
      if(locError) locError.style.display = 'none';
      if(state.capturedImage) scheduleDraw();
    } else {
      throw new Error(data.info || '高德解析失败');
    }
  } catch(err) { 
    console.error('逆地理编码失败:', err); 
    if(locError) {
      locError.style.display = 'block';
      locText.textContent = '自动获取失败';
    }
    showToast('地址解析失败，请手动输入', 'error');
  }
}

function enterEditor(){
  if(state.stream) {
    state.stream.getTracks().forEach(track => track.stop());
    state.stream = null;
  }

  setPreviewHeight('35vh');

  switchView('editorView');
  const now = new Date();
  document.getElementById('inputTime').value = formatTime(now);

  if(state.geo.lat){
    document.getElementById('inputLat').value = state.geo.lat;
    document.getElementById('inputLng').value = state.geo.lng;
  }
  if(state.geo.address) document.getElementById('inputLocation').value = state.geo.address;
  
  // 硬编码设备型号
  document.getElementById('inputDevice').value = 'iPhone 13 Pro';
  
  scheduleDraw();
}

function formatTime(date){
  const weekdays = ['周日','周一','周二','周三','周四','周五','周六'];
  const y = date.getFullYear();
  const mo = String(date.getMonth()+1).padStart(2,'0');
  const d = String(date.getDate()).padStart(2,'0');
  const w = weekdays[date.getDay()];
  const h = String(date.getHours()).padStart(2,'0');
  const mi = String(date.getMinutes()).padStart(2,'0');
  return `${y}.${mo}.${d} ${w} ${h}:${mi}`;
}

function switchView(viewId){
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.getElementById(viewId).classList.add('active');
  
  if(viewId === 'cameraView') {
    // 优化：释放内存
    if(state.capturedImage) {
      state.capturedImage = null;
    }
    const cameraCanvas = document.getElementById('cameraCanvas');
    const ctx = cameraCanvas.getContext('2d');
    ctx.clearRect(0,0,cameraCanvas.width, cameraCanvas.height);

    if(!state.stream) {
      startCamera();
    } else {
      const video = document.getElementById('cameraVideo');
      if(video.srcObject !== state.stream) video.srcObject = state.stream;
    }
  }
}

function drawClockIcon(ctx, x, y, size, color) {
  ctx.strokeStyle = color;
  ctx.lineWidth = size * 0.12;
  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';
  ctx.beginPath();
  ctx.arc(x + size/2, y + size/2, size/2 - ctx.lineWidth/2, 0, Math.PI * 2);
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(x + size/2, y + size/4);
  ctx.lineTo(x + size/2, y + size/2);
  ctx.lineTo(x + size * 0.7, y + size/2);
  ctx.stroke();
}

function drawLocationIcon(ctx, x, y, size, color) {
  ctx.strokeStyle = color;
  ctx.lineWidth = size * 0.12;
  ctx.lineCap = 'round';
  ctx.fillStyle = 'transparent';
  ctx.beginPath();
  ctx.arc(x + size/2, y + size * 0.35, size * 0.3, 0, Math.PI * 2);
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(x + size/2, y + size * 0.65);
  ctx.lineTo(x + size/2, y + size);
  ctx.stroke();
}

function drawTagIcon(ctx, x, y, size, color) {
  ctx.strokeStyle = color;
  ctx.lineWidth = size * 0.12;
  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';
  ctx.beginPath();
  ctx.moveTo(x + size*0.1, y + size*0.5);
  ctx.lineTo(x + size*0.5, y + size*0.1);
  ctx.lineTo(x + size*0.9, y + size*0.1);
  ctx.lineTo(x + size*0.9, y + size*0.5);
  ctx.lineTo(x + size*0.5, y + size*0.9);
  ctx.closePath();
  ctx.stroke();
}

function drawResult(){
  // 优化：折叠时不绘制
  if(!state.isPreviewOpen || !state.capturedImage) return;

  const canvas = document.getElementById('resultCanvas');
  const ctx = canvas.getContext('2d');
  const img = state.capturedImage;

  const W = img.naturalWidth;
  const H = img.naturalHeight;

  const sideBorder = Math.max(Math.min(W, H) * 0.03, 16); 
  const topBorder = sideBorder;
  const padding = sideBorder * 0.8;

  // 优化：基于最小尺寸计算字体，确保横竖屏字号一致
  const minDimension = Math.min(W, H);
  const baseFont = Math.max(minDimension * 0.03, 14);
  
  const timeFont = baseFont * 1.8; 
  const infoFont = baseFont * 1.2; 
  const smallFont = baseFont * 0.9; 
  const iconSize = baseFont * 0.8;

  const lineHeight = 1.8;
  const textHeight = padding * 2 + (timeFont * lineHeight) + (infoFont * lineHeight) + (smallFont * lineHeight) + (smallFont * lineHeight) + 20;
  
  let bottomBorder = Math.max(H * 0.2, textHeight);

  canvas.width = W + sideBorder * 2;
  canvas.height = H + topBorder + bottomBorder;

  ctx.fillStyle = '#ffffff';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  
  ctx.drawImage(img, sideBorder, topBorder, W, H);

  drawWatermarkText(ctx, canvas.width, canvas.height, W, H, sideBorder, topBorder, bottomBorder, timeFont, infoFont, smallFont, iconSize, padding);
}

function drawWatermarkText(ctx, cW, cH, imgW, imgH, sideB, topB, bottomB, timeFont, infoFont, smallFont, iconSize, padding) {
  const time = document.getElementById('inputTime').value || formatTime(new Date());
  const type = document.getElementById('inputType').value || '现场核查';
  const location = document.getElementById('inputLocation').value || '未填写地点';
  const lat = document.getElementById('inputLat').value;
  const lng = document.getElementById('inputLng').value;
  const device = document.getElementById('inputDevice').value || 'iPhone 13 Pro';
  const note = document.getElementById('inputNote').value;

  const textAreaY = topB + imgH;
  const leftX = sideB + padding;
  const rightX = sideB + imgW - padding;

  const lineHeight = 1.8;
  let currentY = textAreaY + padding;

  const colorPrimary = '#2563EB'; 
  const colorText1 = '#0F172A';   
  const colorText2 = '#334155';   
  const colorText3 = '#64748B';   
  const colorLine = '#E2E8F0';    

  const fontSizeTime = parseFloat(timeFont) || 18;
  const fontSizeInfo = parseFloat(infoFont) || 14;
  const fontSizeSmall = parseFloat(smallFont) || 12;
  
  const iconSzTime = Math.ceil(fontSizeTime * 1.2);
  const iconSzInfo = Math.ceil(fontSizeInfo * 1.2);
  const iconSzSmall = Math.ceil(fontSizeSmall * 1.2);

  const maxIconWidth = Math.max(iconSzTime, iconSzInfo, iconSzSmall);  
  const textX = leftX + maxIconWidth + padding * 0.5;
  const maxTextWidth = rightX - textX;

  const offsetX_Time = (maxIconWidth - iconSzTime) / 2;
  const offsetX_Info = (maxIconWidth - iconSzInfo) / 2;
  const offsetX_Small = (maxIconWidth - iconSzSmall) / 2;

  drawClockIcon(ctx, leftX + offsetX_Time, currentY + (fontSizeTime - iconSzTime)/2, iconSzTime, colorPrimary);
  ctx.fillStyle = colorText1;
  ctx.font = `700 ${timeFont}px 'JetBrains Mono', monospace`;
  ctx.textAlign = 'left';
  ctx.textBaseline = 'top';
  const timeStr = time;
  ctx.fillText(timeStr, textX, currentY);
  currentY += fontSizeTime * lineHeight;

  drawLocationIcon(ctx, leftX + offsetX_Info, currentY + (fontSizeInfo - iconSzInfo)/2, iconSzInfo, colorPrimary);
  ctx.fillStyle = colorText2;
  ctx.font = `500 ${infoFont}px 'Noto Sans SC', sans-serif`;
  let locText = truncateText(ctx, location, maxTextWidth);
  ctx.fillText(locText, textX, currentY);
  currentY += fontSizeInfo * lineHeight;

  drawTagIcon(ctx, leftX + offsetX_Small, currentY + (fontSizeSmall - iconSzSmall)/2, iconSzSmall, colorPrimary);
  ctx.fillStyle = colorText3;
  ctx.font = `400 ${smallFont}px 'Noto Sans SC', sans-serif`;
  let typeText = type + (note ? ` · ${note}` : '');
  typeText = truncateText(ctx, typeText, maxTextWidth);
  ctx.fillText(typeText, textX, currentY);
  currentY += fontSizeSmall * lineHeight;

  ctx.strokeStyle = colorLine;
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(leftX, currentY);
  ctx.lineTo(rightX, currentY);
  ctx.stroke();
  currentY += 25;

  ctx.fillStyle = colorText3;
  ctx.font = `400 ${smallFont}px 'Noto Sans SC', sans-serif`;
  ctx.textBaseline = 'top';
  
  ctx.textAlign = 'left';
  let devText = truncateText(ctx, device, (rightX - leftX) / 2 - padding);
  ctx.fillText(devText, leftX, currentY);

  ctx.textAlign = 'right';
  let coordText = '';
  if(lat && lng) coordText = `${formatCoord(lat, 'N')} ${formatCoord(lng, 'E')}`;
  if(coordText) {
    coordText = truncateText(ctx, coordText, (rightX - leftX) / 2);
    ctx.fillText(coordText, rightX, currentY);
  }
}

function truncateText(ctx, text, maxWidth){
  if(ctx.measureText(text).width <= maxWidth) return text;
  let truncated = text;
  while(ctx.measureText(truncated + '...').width > maxWidth && truncated.length > 0){
    truncated = truncated.slice(0, -1);
  }
  return truncated + '...';
}

function formatCoord(val, dir){
  const v = parseFloat(val);
  if(isNaN(v)) return val;
  const abs = Math.abs(v);
  const d = Math.floor(abs);
  const m = ((abs - d) * 60).toFixed(2);
  return `${d}°${m}'${dir}`;
}

// 新增：直接下载功能
function triggerDownload(blob){
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `WorkRecord_${Date.now()}.jpg`;
  a.click();
  URL.revokeObjectURL(url);
  showToast('已开始下载', 'success');
  document.getElementById('saveOverlay').classList.remove('show');
}

function saveImage(){
  const canvas = document.getElementById('resultCanvas');
  canvas.toBlob(blob => {
    if(!blob){ showToast('生成图片失败', 'error'); return; }
    state.lastBlob = blob;
    shareImage(blob);
  }, 'image/jpeg', 0.95);
}

async function shareImage(blob){
  const file = new File([blob], `WorkRecord_${Date.now()}.jpg`, { type: 'image/jpeg' });
  
  if (navigator.canShare && navigator.canShare({ files: [file] })) {
    try {
      await navigator.share({
        files: [file],
        title: '工作水印照片',
        text: '工作记录照片'
      });
      showToast('已通过系统分享保存', 'success');
    } catch (err) {
      if (err.name !== 'AbortError') {
        console.error('分享失败:', err);
        fallbackSave(blob);
      }
    }
  } else {
    fallbackSave(blob);
  }
}

function fallbackSave(blob){
  const url = URL.createObjectURL(blob);
  document.getElementById('savePreviewImg').src = url;
  document.getElementById('saveOverlay').classList.add('show');
}

function showToast(msg, type){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show' + (type ? ' ' + type : '');
  clearTimeout(t._timer);
  t._timer = setTimeout(() => t.classList.remove('show'), 2500);
}

window.addEventListener('load', init);
