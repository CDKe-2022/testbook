<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="theme-color" content="#ffffff">
<title>工作水印相机</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;600;700;900&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#f4f5f7;
  --surface:#ffffff;
  --surface-2:#f8f9fa;
  --surface-3:#f1f3f5;
  --border:#e5e7eb;
  --border-hi:#d1d5db;
  --fg:#1f2937;
  --fg-2:#374151;
  --muted:#9ca3af;
  --muted-hi:#6b7280;
  --accent:#0d9488;
  --accent-hi:#14b8a6;
  --accent-dark:#0f766e;
  --accent-soft:rgba(13,148,136,0.08);
  --danger:#ef4444;
  --shadow:0 1px 3px rgba(0,0,0,0.06),0 1px 2px rgba(0,0,0,0.04);
  --shadow-md:0 4px 12px rgba(0,0,0,0.08);
  --shadow-lg:0 12px 32px rgba(0,0,0,0.15);
  --safe-top:env(safe-area-inset-top,0px);
  --safe-bottom:env(safe-area-inset-bottom,0px);
}

*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden}
body{
  font-family:'Noto Sans SC',-apple-system,BlinkMacSystemFont,sans-serif;
  background:var(--bg);color:var(--fg);
  -webkit-font-smoothing:antialiased;
  user-select:none;-webkit-user-select:none;
}
.mono{font-family:'JetBrains Mono',monospace}

.view{position:fixed;inset:0;display:none;flex-direction:column}
.view.active{display:flex}

#cameraView{background:#000;z-index:1}
#cameraView .preview-container{
  flex:1;position:relative;overflow:hidden;
  display:flex;align-items:center;justify-content:center;
}
#cameraVideo{width:100%;height:100%;object-fit:cover;transform:scaleX(-1);}
#cameraCanvas{display:none}

.grid-overlay{
  position:absolute;inset:0;pointer-events:none;
  background-image:
    linear-gradient(to right,rgba(255,255,255,0.15) 1px,transparent 1px),
    linear-gradient(to bottom,rgba(255,255,255,0.15) 1px,transparent 1px);
  background-size:33.33% 33.33%;
}

.camera-topbar{
  position:absolute;top:0;left:0;right:0;
  padding:calc(12px + var(--safe-top)) 16px 12px;
  background:linear-gradient(to bottom,rgba(0,0,0,0.6),transparent);
  display:flex;justify-content:space-between;align-items:center;
  z-index:10;
}
.top-info{display:flex;flex-direction:column;gap:2px}
.top-time{color:#fff;font-size:15px;font-weight:600;font-family:'JetBrains Mono',monospace;letter-spacing:0.02em}
.top-loc{color:rgba(255,255,255,0.8);font-size:11px;display:flex;align-items:center;gap:4px}
.top-loc.waiting{color:rgba(255,255,255,0.5)}
.loc-dot{width:6px;height:6px;border-radius:50%;background:var(--accent-hi);animation:pulse 1.5s infinite}
.loc-dot.fixed{background:#10b981;animation:none}
@keyframes pulse{0%,100%{opacity:0.4}50%{opacity:1}}

.camera-topbtns{display:flex;gap:8px}
.top-btn{
  width:36px;height:36px;border-radius:50%;
  background:rgba(255,255,255,0.15);backdrop-filter:blur(12px);
  border:none;color:#fff;display:flex;align-items:center;justify-content:center;
  cursor:pointer;transition:all 0.15s;
}
.top-btn:active{transform:scale(0.92);background:rgba(255,255,255,0.25)}

.camera-bottombar{
  background:#000;padding:20px 20px calc(20px + var(--safe-bottom));
  display:flex;align-items:center;justify-content:space-around;z-index:10;
}
.shutter-wrap{position:relative;display:flex;align-items:center;justify-content:center}
.shutter{
  width:72px;height:72px;border-radius:50%;
  background:#fff;border:4px solid #fff;
  box-shadow:0 0 0 3px rgba(255,255,255,0.3);
  cursor:pointer;transition:all 0.15s;position:relative;
}
.shutter::after{content:'';position:absolute;inset:4px;border-radius:50%;background:#fff;transition:all 0.15s;}
.shutter:active::after{background:#ddd;transform:scale(0.9)}

.bottom-action{display:flex;flex-direction:column;align-items:center;gap:6px;color:rgba(255,255,255,0.8);font-size:11px;cursor:pointer;}
.bottom-action:active{color:#fff}
.bottom-action .icon-circle{
  width:48px;height:48px;border-radius:50%;
  background:rgba(255,255,255,0.1);
  display:flex;align-items:center;justify-content:center;transition:all 0.15s;
}
.bottom-action:active .icon-circle{background:rgba(255,255,255,0.2);transform:scale(0.92)}

.flash{position:absolute;inset:0;background:#fff;z-index:100;opacity:0;pointer-events:none}
.flash.active{animation:flashAnim 0.4s ease-out}
@keyframes flashAnim{0%{opacity:0}15%{opacity:1}100%{opacity:0}}

.permission-prompt{
  position:absolute;inset:0;background:#000;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:16px;padding:40px;text-align:center;z-index:50;
}
.permission-prompt svg{color:var(--muted)}
.permission-prompt h3{color:#fff;font-size:18px;font-weight:600}
.permission-prompt p{color:var(--muted);font-size:13px;line-height:1.6;max-width:280px}
.permission-btn{
  padding:12px 32px;background:var(--accent);color:#fff;
  border:none;border-radius:24px;font-size:15px;font-weight:600;
  font-family:inherit;cursor:pointer;margin-top:8px;
}

/* ========== 编辑页布局重构 ========== */
#editorView{
  background:var(--bg);
  z-index:2;
  display:flex;
  flex-direction:column;
  height:100vh;
}

.editor-header{
  flex:0 0 auto;
  background:var(--surface);
  padding:calc(12px + var(--safe-top)) 16px 12px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  border-bottom:1px solid var(--border);
  box-shadow:var(--shadow);
  z-index:10;
}
.editor-header h2{font-size:17px;font-weight:600;color:var(--fg)}

/* 优化按钮设计 */
.header-btn{
  padding:10px 20px;
  border:none;
  border-radius:12px;
  font-family:inherit;
  font-size:15px;
  font-weight:600;
  cursor:pointer;
  transition:all 0.15s;
  display:flex;
  align-items:center;
  gap:6px;
}
.header-btn.back{
  background:var(--surface-2);
  color:var(--fg-2);
}
.header-btn.back:active{
  background:var(--surface-3);
  transform:scale(0.95);
}
.header-btn.save{
  background:var(--accent);
  color:#fff;
  box-shadow:0 2px 8px rgba(13,148,136,0.3);
}
.header-btn.save:active{
  background:var(--accent-dark);
  transform:scale(0.95);
}
.header-btn.save:disabled{
  opacity:0.5;
  box-shadow:none;
}

/* 预览区域 */
.preview-area{
  flex:0 0 auto;
  max-height:50vh;
  overflow:hidden;
  padding:16px;
  display:flex;
  align-items:center;
  justify-content:center;
  background:var(--surface-3);
  border-bottom:1px solid var(--border);
}
.preview-frame{
  width:100%;
  max-width:400px;
  display:flex;
  align-items:center;
  justify-content:center;
}
.preview-frame canvas{
  max-width:100%;
  max-height:40vh;
  width:auto;
  height:auto;
  object-fit:contain;
  box-shadow:var(--shadow-md);
  border-radius:8px;
  background:#fff;
}

/* 编辑表单区域 */
.edit-sheet{
  flex:1;
  min-height:0;
  overflow-y:auto;
  -webkit-overflow-scrolling:touch;
  background:var(--surface);
  border-radius:16px 16px 0 0;
  box-shadow:0 -4px 20px rgba(0,0,0,0.08);
  padding:16px 16px calc(20px + var(--safe-bottom));
  margin-top:-16px;
  position:relative;
  z-index:5;
}
.sheet-handle{width:36px;height:4px;background:var(--border-hi);border-radius:2px;margin:0 auto 16px;}
.sheet-title{font-size:15px;font-weight:600;color:var(--fg);margin-bottom:16px;display:flex;align-items:center;gap:8px;}
.sheet-title::before{content:'';width:3px;height:16px;background:var(--accent);border-radius:2px;}

.field{margin-bottom:14px}
.field-label{font-size:12px;color:var(--muted-hi);font-weight:500;margin-bottom:6px;display:flex;align-items:center;justify-content:space-between;}
.field-label .auto-tag{font-size:10px;color:var(--accent);background:var(--accent-soft);padding:2px 6px;border-radius:4px;}
.input-row{display:flex;gap:8px;align-items:center}
input[type="text"],input[type="number"],select,textarea{
  width:100%;background:var(--surface-2);border:1px solid var(--border);border-radius:8px;
  padding:10px 12px;font-family:inherit;font-size:14px;color:var(--fg);outline:none;transition:all 0.15s;
}
input:focus,select:focus,textarea:focus{border-color:var(--accent);background:#fff;box-shadow:0 0 0 3px var(--accent-soft);}
input[type="text"]{user-select:text;-webkit-user-select:text}
.btn-inline{
  padding:10px 14px;background:var(--surface-2);border:1px solid var(--border);border-radius:8px;
  font-family:inherit;font-size:13px;color:var(--fg-2);cursor:pointer;white-space:nowrap;display:flex;align-items:center;gap:4px;
}
.btn-inline:active{background:var(--surface-3)}

.field-grid-2{display:grid;grid-template-columns:1fr 1fr;gap:8px}

.device-picker{display:flex;gap:6px;overflow-x:auto;padding-bottom:4px;margin:0 -4px;padding:0 4px 4px;scrollbar-width:none;}
.device-picker::-webkit-scrollbar{display:none}
.device-chip{
  padding:8px 14px;background:var(--surface-2);border:1px solid var(--border);border-radius:20px;
  font-size:12px;color:var(--muted-hi);white-space:nowrap;cursor:pointer;transition:all 0.15s;
}
.device-chip:active{transform:scale(0.95)}
.device-chip.active{background:var(--accent);border-color:var(--accent);color:#fff;font-weight:500}

.toast{
  position:fixed;top:calc(60px + var(--safe-top));left:50%;transform:translateX(-50%) translateY(-20px);
  background:rgba(31,41,55,0.95);backdrop-filter:blur(12px);color:#fff;padding:10px 20px;border-radius:24px;
  font-size:13px;z-index:1000;opacity:0;transition:all 0.3s;pointer-events:none;box-shadow:var(--shadow-lg);max-width:90%;text-align:center;
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.toast.error{background:rgba(239,68,68,0.95)}
.toast.success{background:rgba(16,185,129,0.95)}

.save-overlay{
  position:fixed;inset:0;background:rgba(0,0,0,0.85);backdrop-filter:blur(8px);z-index:999;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  opacity:0;pointer-events:none;transition:opacity 0.2s;padding:20px;
}
.save-overlay.show{opacity:1;pointer-events:auto}
.save-overlay .hint-text{color:#fff;font-size:16px;margin-bottom:20px;text-align:center;font-weight:500;}
.save-overlay .hint-sub{color:rgba(255,255,255,0.6);font-size:13px;margin-bottom:24px;text-align:center;}
.save-preview-img{max-width:80%;max-height:50vh;border-radius:8px;box-shadow:0 8px 32px rgba(0,0,0,0.5);}
.save-actions{margin-top:32px;display:flex;gap:12px}
.save-actions button{padding:12px 24px;border-radius:24px;border:none;font-family:inherit;font-size:14px;font-weight:600;cursor:pointer;}
.btn-secondary{background:rgba(255,255,255,0.15);color:#fff}
.btn-primary{background:var(--accent);color:#fff}

.icon{width:20px;height:20px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.icon-sm{width:16px;height:16px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}

@media(min-width:600px){
  #cameraView .preview-container{max-width:420px;margin:0 auto}
  .camera-bottombar{max-width:420px;margin:0 auto}
  .camera-topbar{max-width:420px;margin:0 auto;left:50%;transform:translateX(-50%);right:auto;width:100%}
  #editorView .preview-area{max-width:480px;margin:0 auto}
  #editorView .edit-sheet{max-width:480px;margin:0 auto}
  .editor-header{max-width:480px;margin:0 auto}
}
</style>
</head>
<body>

<div class="view active" id="cameraView">
  <div class="preview-container">
    <video id="cameraVideo" autoplay playsinline muted></video>
    <canvas id="cameraCanvas"></canvas>
    <div class="grid-overlay" id="gridOverlay" style="display:none;"></div>
    <div class="flash" id="flash"></div>

    <div class="camera-topbar">
      <div class="top-info">
        <div class="top-time" id="liveTime">--:--</div>
        <div class="top-loc waiting" id="topLoc">
          <span class="loc-dot" id="locDot"></span>
          <span id="locText">正在定位...</span>
        </div>
      </div>
      <div class="camera-topbtns">
        <button class="top-btn" id="gridBtn" title="网格线">
          <svg class="icon" viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
        </button>
        <button class="top-btn" id="switchCameraBtn" title="切换摄像头">
          <svg class="icon" viewBox="0 0 24 24"><path d="M23 4v6h-6"/><path d="M1 20v-6h6"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10"/><path d="M20.49 15a9 9 0 0 1-14.85 3.36L1 14"/></svg>
        </button>
      </div>
    </div>

    <div class="permission-prompt" id="permissionPrompt">
      <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/>
        <circle cx="12" cy="13" r="4"/>
      </svg>
      <h3>需要摄像头权限</h3>
      <p>请允许使用摄像头和位置权限，以便拍摄带水印的工作照片</p>
      <button class="permission-btn" id="enableCameraBtn">开启摄像头</button>
    </div>
  </div>

  <div class="camera-bottombar">
    <div class="bottom-action" id="albumBtn">
      <div class="icon-circle">
        <svg class="icon" viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
      </div>
      <span>相册</span>
    </div>
    <div class="shutter-wrap">
      <button class="shutter" id="shutterBtn"></button>
    </div>
    <div class="bottom-action" id="manualUploadBtn">
      <div class="icon-circle">
        <svg class="icon" viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
      </div>
      <span>原生相机</span>
    </div>
  </div>
</div>

<div class="view" id="editorView">
  <div class="editor-header">
    <button class="header-btn back" id="editorBackBtn">
      <svg class="icon-sm" viewBox="0 0 24 24"><path d="M19 12H5"/><path d="M12 19l-7-7 7-7"/></svg>
      返回
    </button>
    <h2>预览与编辑</h2>
    <button class="header-btn save" id="editorSaveBtn">保存</button>
  </div>

  <div class="preview-area">
    <div class="preview-frame">
      <canvas id="resultCanvas"></canvas>
    </div>
  </div>

  <div class="edit-sheet" id="editSheet">
    <div class="sheet-handle"></div>
    <div class="sheet-title">拍摄信息</div>

    <div class="field">
      <div class="field-label"><span>拍摄时间</span><span class="auto-tag">自动获取</span></div>
      <input type="text" id="inputTime" placeholder="2024-01-15 周一 14:30">
    </div>

    <div class="field">
      <div class="field-label"><span>照片类型</span></div>
      <div class="device-picker" id="typePicker">
        <div class="device-chip active" data-type="现场核查">现场核查</div>
        <div class="device-chip" data-type="进度汇报">进度汇报</div>
        <div class="device-chip" data-type="问题记录">问题记录</div>
        <div class="device-chip" data-type="竣工验收">竣工验收</div>
      </div>
      <input type="text" id="inputType" value="现场核查" placeholder="如：现场核查" style="margin-top:8px;">
    </div>

    <div class="field">
      <div class="field-label">
        <span>详细地址</span>
        <button class="btn-inline" id="refreshLocBtn" style="font-size:11px;padding:4px 10px;">
          <svg class="icon-sm" viewBox="0 0 24 24"><path d="M21 12a9 9 0 1 1-9-9c2.52 0 4.85.83 6.72 2.23"/><path d="M21 3v6h-6"/></svg>
          重新定位
        </button>
      </div>
      <textarea id="inputLocation" placeholder="请输入详细地址（如：四川省自贡市自流井区自由路123号XX公司）" rows="2"></textarea>
      <div id="locError" style="color: var(--danger); font-size: 11px; margin-top: 4px; display: none;">
        *自动获取地址失败，请手动输入
      </div>
    </div>

    <div class="field">
      <div class="field-label"><span>经纬度</span></div>
      <div class="field-grid-2">
        <input type="text" id="inputLat" inputmode="decimal" placeholder="纬度">
        <input type="text" id="inputLng" inputmode="decimal" placeholder="经度">
      </div>
    </div>

    <div class="field">
      <div class="field-label"><span>拍摄设备</span></div>
      <div class="device-picker" id="devicePicker"></div>
      <input type="text" id="inputDevice" placeholder="或手动输入设备型号" style="margin-top:8px;">
    </div>

    <div class="field">
      <div class="field-label"><span>备注信息（选填）</span></div>
      <input type="text" id="inputNote" placeholder="如：施工区域A">
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<div class="save-overlay" id="saveOverlay">
  <div class="hint-text">长按下方图片保存到相册</div>
  <div class="hint-sub">若系统未弹出保存选项，请使用此方式保存</div>
  <img id="savePreviewImg" class="save-preview-img" alt="预览图">
  <div class="save-actions">
    <button class="btn-secondary" id="saveCloseBtn">关闭</button>
    <button class="btn-primary" id="saveRetryBtn">重试系统分享</button>
  </div>
</div>

<input type="file" id="fileInput" accept="image/*" style="display:none;">
<input type="file" id="cameraInput" accept="image/*" capture="environment" style="display:none;">

<script>
const AMAP_KEY = 'aa30998599ef699354a51a1236aa6946'; 

const state = {
  stream: null,
  facingMode: 'environment',
  capturedImage: null,
  geo: { lat: '', lng: '', accuracy: 0, address: '' },
  locationReady: false,
  device: { brand: '', model: '' },
  currentDeviceChip: '',
  currentTypeChip: '现场核查',
  lastBlob: null,
};

const deviceModels = {
  apple: ['iPhone 13 Pro','iPhone 15 Pro Max','iPhone 15 Pro','iPhone 14 Pro Max','iPhone 14 Pro','iPhone 12 Pro'],
  huawei: ['华为 Mate 60 Pro','华为 P60 Pro','华为 Mate 50 Pro'],
  xiaomi: ['小米 14 Pro','小米 13 Pro','Redmi K70'],
  vivo: ['vivo X100','vivo X90'],
  oppo: ['OPPO Find X7','OPPO Find X6'],
};

function debounce(func, wait) {
  let timeout;
  return function(...args) {
    clearTimeout(timeout);
    timeout = setTimeout(() => func.apply(this, args), wait);
  };
}

const debouncedDrawResult = debounce(drawResult, 300);

function haptic(style = 'light') {
  if (navigator.vibrate) {
    navigator.vibrate(style === 'heavy' ? 20 : 10);
  }
}

function jsonpRequest(url) {
  return new Promise((resolve, reject) => {
    const callbackName = 'amap_jsonp_' + Date.now() + '_' + Math.floor(Math.random() * 10000);
    window[callbackName] = function(data) {
      resolve(data);
      delete window[callbackName];
      const script = document.getElementById(callbackName);
      if (script) document.head.removeChild(script);
    };
    const script = document.createElement('script');
    script.id = callbackName;
    script.src = url + (url.includes('?') ? '&' : '?') + 'callback=' + callbackName;
    script.onerror = reject;
    document.head.appendChild(script);
  });
}

async function init(){
  if (document.fonts) {
    await document.fonts.ready;
  }
  detectDevice();
  renderDevicePicker();
  bindEvents();
  startLiveTime();
  requestLocation();
}

function detectDevice(){
  const ua = navigator.userAgent;
  let brand = 'apple';
  let model = 'iPhone 13 Pro';

  if(/iPhone|iPad|iPod/i.test(ua)){
    brand = 'apple';
    const w = screen.width * (window.devicePixelRatio || 1);
    const h = screen.height * (window.devicePixelRatio || 1);
    const res = `${Math.max(w,h)}x${Math.min(w,h)}`;
    const appleMap = { 
      '2796x1290':'iPhone 15 Pro Max', 
      '2778x1284':'iPhone 14 Pro Max', 
      '2532x1170':'iPhone 15 Pro', 
      '2532x1170':'iPhone 14 Pro', 
      '1170x2532':'iPhone 13 Pro'
    };
    if(appleMap[res]) model = appleMap[res];
  } else if(/Android/i.test(ua)){
    if(/Huawei|HONOR/i.test(ua)) brand = 'huawei';
    else if(/Xiaomi|Redmi/i.test(ua)) brand = 'xiaomi';
    else if(/vivo/i.test(ua)) brand = 'vivo';
    else if(/OPPO|oppo/i.test(ua)) brand = 'oppo';
    const m = ua.match(/;\s*([a-zA-Z0-9\-_]+)\s*Build/);
    if(m) model = m[1];
  }
  
  state.device = { brand, model };
}

function renderDevicePicker(){
  const picker = document.getElementById('devicePicker');
  let html = '';
  Object.keys(deviceModels).forEach(b => {
    deviceModels[b].forEach(m => { html += `<div class="device-chip" data-device="${m}">${m}</div>`; });
  });
  picker.innerHTML = html;

  const defaultChip = [...picker.querySelectorAll('.device-chip')].find(c => c.dataset.device === state.device.model);
  if(defaultChip){
    defaultChip.classList.add('active');
    state.currentDeviceChip = state.device.model;
    document.getElementById('inputDevice').value = state.device.model;
  } else {
    const firstChip = picker.querySelector('.device-chip');
    if(firstChip){
      firstChip.classList.add('active');
      state.currentDeviceChip = firstChip.dataset.device;
      document.getElementById('inputDevice').value = state.currentDeviceChip;
    }
  }

  picker.querySelectorAll('.device-chip').forEach(chip => {
    chip.addEventListener('click', () => {
      haptic('light');
      picker.querySelectorAll('.device-chip').forEach(c => c.classList.remove('active'));
      chip.classList.add('active');
      state.currentDeviceChip = chip.dataset.device;
      document.getElementById('inputDevice').value = chip.dataset.device;
      drawResult();
    });
  });

  const typePicker = document.getElementById('typePicker');
  typePicker.querySelectorAll('.device-chip').forEach(chip => {
    chip.addEventListener('click', () => {
      haptic('light');
      typePicker.querySelectorAll('.device-chip').forEach(c => c.classList.remove('active'));
      chip.classList.add('active');
      state.currentTypeChip = chip.dataset.type;
      document.getElementById('inputType').value = chip.dataset.type;
      drawResult();
    });
  });
  document.getElementById('inputType').addEventListener('input', e => {
    typePicker.querySelectorAll('.device-chip').forEach(c => c.classList.remove('active'));
    drawResult();
  });
}

function bindEvents(){
  document.getElementById('enableCameraBtn').addEventListener('click', startCamera);
  document.getElementById('shutterBtn').addEventListener('click', () => { haptic('heavy'); capture(); });
  document.getElementById('switchCameraBtn').addEventListener('click', () => { haptic('light'); switchCamera(); });
  document.getElementById('gridBtn').addEventListener('click', () => {
    const g = document.getElementById('gridOverlay');
    g.style.display = g.style.display === 'none' ? 'block' : 'none';
  });

  document.getElementById('albumBtn').addEventListener('click', () => document.getElementById('fileInput').click());
  document.getElementById('manualUploadBtn').addEventListener('click', () => document.getElementById('cameraInput').click());
  
  document.getElementById('fileInput').addEventListener('change', e => { if(e.target.files[0]) loadFromFile(e.target.files[0]); });
  document.getElementById('cameraInput').addEventListener('change', e => { if(e.target.files[0]) loadFromFile(e.target.files[0]); });

  document.getElementById('editorBackBtn').addEventListener('click', () => {
    if(state.stream) switchView('cameraView');
    else window.history.back();
  });
  
  document.getElementById('editorSaveBtn').addEventListener('click', saveImage);

  ['inputTime','inputType','inputLocation','inputLat','inputLng','inputDevice','inputNote'].forEach(id => {
    document.getElementById(id).addEventListener('input', debouncedDrawResult);
  });

  document.getElementById('refreshLocBtn').addEventListener('click', requestLocation);
  
  document.getElementById('saveCloseBtn').addEventListener('click', () => document.getElementById('saveOverlay').classList.remove('show'));
  document.getElementById('saveRetryBtn').addEventListener('click', () => {
    if(state.lastBlob) shareImage(state.lastBlob);
  });
}

function startLiveTime(){
  const update = () => {
    const now = new Date();
    const h = String(now.getHours()).padStart(2,'0');
    const m = String(now.getMinutes()).padStart(2,'0');
    document.getElementById('liveTime').textContent = `${h}:${m}`;
  };
  update();
  setInterval(update, 1000);
}

async function startCamera(){
  document.getElementById('permissionPrompt').style.display = 'none';
  try {
    state.stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: state.facingMode, width: { ideal: 1920 }, height: { ideal: 1080 } },
      audio: false
    });
    const video = document.getElementById('cameraVideo');
    video.srcObject = state.stream;
    video.style.transform = state.facingMode === 'user' ? 'scaleX(-1)' : 'none';
  } catch(err) {
    showToast('无法访问摄像头，请检查权限或使用上传功能', 'error');
    document.getElementById('permissionPrompt').style.display = 'flex';
  }
}

async function switchCamera(){
  if(!state.stream) return;
  state.stream.getTracks().forEach(t => t.stop());
  state.facingMode = state.facingMode === 'environment' ? 'user' : 'environment';
  await startCamera();
}

function capture(){
  const video = document.getElementById('cameraVideo');
  if(!video.videoWidth){ showToast('摄像头未就绪', 'error'); return; }

  const flash = document.getElementById('flash');
  flash.classList.remove('active');
  void flash.offsetWidth;
  flash.classList.add('active');

  const canvas = document.getElementById('cameraCanvas');
  const ctx = canvas.getContext('2d');
  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;

  if(state.facingMode === 'user'){
    ctx.translate(canvas.width, 0);
    ctx.scale(-1, 1);
  }
  ctx.drawImage(video, 0, 0);

  const dataUrl = canvas.toDataURL('image/jpeg', 0.95);
  const img = new Image();
  img.onload = () => { state.capturedImage = img; enterEditor(); };
  img.src = dataUrl;
}

function loadFromFile(file){
  const reader = new FileReader();
  reader.onload = e => {
    const img = new Image();
    img.onload = () => { state.capturedImage = img; enterEditor(); };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
}

function requestLocation(){
  const locEl = document.getElementById('topLoc');
  const locText = document.getElementById('locText');
  const locDot = document.getElementById('locDot');
  const locError = document.getElementById('locError');

  if(!navigator.geolocation){ 
    locText.textContent = '不支持定位';
    return; 
  }

  locText.textContent = '正在定位...';
  locDot.classList.remove('fixed');
  locEl.classList.add('waiting');
  locError.style.display = 'none';

  navigator.geolocation.getCurrentPosition(
    pos => {
      state.geo.lat = pos.coords.latitude.toFixed(6);
      state.geo.lng = pos.coords.longitude.toFixed(6);
      state.geo.accuracy = pos.coords.accuracy;
      state.locationReady = true;

      locText.textContent = `${state.geo.lat}°, ${state.geo.lng}°`;
      locDot.classList.add('fixed');
      locEl.classList.remove('waiting');

      document.getElementById('inputLat').value = state.geo.lat;
      document.getElementById('inputLng').value = state.geo.lng;

      reverseGeocode(state.geo.lat, state.geo.lng);
    },
    err => {
      locText.textContent = '定位失败，请手动输入';
      locEl.classList.add('waiting');
      locError.style.display = 'block';
      showToast('定位失败，可在编辑页手动输入', 'error');
    },
    { enableHighAccuracy: true, timeout: 10000, maximumAge: 0 }
  );
}

async function reverseGeocode(lat, lng){
  const locText = document.getElementById('locText');
  const locEl = document.getElementById('topLoc');
  const inputLoc = document.getElementById('inputLocation');
  const locError = document.getElementById('locError');

  try {
    const url = `https://restapi.amap.com/v3/geocode/regeo?output=JSON&location=${lng},${lat}&key=${AMAP_KEY}&radius=1000&extensions=all`;
    const data = await jsonpRequest(url);

    if(data.status === '1' && data.regeocode) {
      const regeocode = data.regeocode;
      let baseAddress = regeocode.formatted_address || '未知地点';
      let poiName = '';
      if(regeocode.pois && regeocode.pois.length > 0) {
        poiName = regeocode.pois[0].name; 
      }
      let finalAddress = baseAddress;
      if(poiName && !baseAddress.includes(poiName)) {
         finalAddress = `${baseAddress} (${poiName})`; 
      }
      state.geo.address = finalAddress;
      inputLoc.value = finalAddress;
      locEl.classList.remove('waiting');
      locText.textContent = finalAddress;
      locError.style.display = 'none';
      if(state.capturedImage) drawResult();
    } else {
      throw new Error(data.info || '高德解析失败');
    }
  } catch(err) { 
    console.error('逆地理编码失败:', err); 
    locError.style.display = 'block';
    locText.textContent = '自动获取失败';
    showToast('地址解析失败，请手动输入', 'error');
  }
}

function enterEditor(){
  switchView('editorView');
  const now = new Date();
  document.getElementById('inputTime').value = formatTime(now);

  if(state.geo.lat){
    document.getElementById('inputLat').value = state.geo.lat;
    document.getElementById('inputLng').value = state.geo.lng;
  }
  if(state.geo.address) document.getElementById('inputLocation').value = state.geo.address;
  
  drawResult();
}

function formatTime(date){
  const weekdays = ['周日','周一','周二','周三','周四','周五','周六'];
  const y = date.getFullYear();
  const mo = String(date.getMonth()+1).padStart(2,'0');
  const d = String(date.getDate()).padStart(2,'0');
  const w = weekdays[date.getDay()];
  const h = String(date.getHours()).padStart(2,'0');
  const mi = String(date.getMinutes()).padStart(2,'0');
  return `${y}.${mo}.${d} ${w} ${h}:${mi}`;
}

function switchView(viewId){
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.getElementById(viewId).classList.add('active');
  if(viewId === 'cameraView' && state.stream){
    const video = document.getElementById('cameraVideo');
    if(video.srcObject !== state.stream) video.srcObject = state.stream;
  }
}

function drawIconDot(ctx, x, y, size, color) {
  ctx.fillStyle = color;
  ctx.beginPath();
  ctx.arc(x + size/2, y + size/2, size/2, 0, Math.PI * 2);
  ctx.fill();
}

function drawIconSquare(ctx, x, y, size, color) {
  ctx.fillStyle = color;
  ctx.fillRect(x, y, size, size);
}

function drawIconTag(ctx, x, y, size, color) {
  ctx.fillStyle = color;
  ctx.beginPath();
  ctx.moveTo(x, y + size/2);
  ctx.lineTo(x + size/2, y);
  ctx.lineTo(x + size, y + size/2);
  ctx.lineTo(x + size/2, y + size);
  ctx.closePath();
  ctx.fill();
}

function drawResult(){
  if(!state.capturedImage) return;
  const canvas = document.getElementById('resultCanvas');
  const ctx = canvas.getContext('2d');
  const img = state.capturedImage;

  const W = img.naturalWidth;
  const H = img.naturalHeight;

  const sideBorder = Math.max(Math.min(W, H) * 0.03, 16); 
  const topBorder = sideBorder;
  const padding = sideBorder * 0.8;

  const baseFont = Math.max(W * 0.024, 14);
  const timeFont = baseFont * 1.8;
  const infoFont = baseFont * 1.2;
  const smallFont = baseFont * 0.9;
  const iconSize = baseFont * 0.8;

  const lineHeight = 1.6;
  const textHeight = padding * 2 + (timeFont * lineHeight) + (infoFont * lineHeight) + (smallFont * lineHeight) + (smallFont * lineHeight) + 20;
  
  let bottomBorder = Math.max(H * 0.2, textHeight);

  canvas.width = W + sideBorder * 2;
  canvas.height = H + topBorder + bottomBorder;

  ctx.fillStyle = '#ffffff';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  ctx.drawImage(img, sideBorder, topBorder, W, H);

  drawWatermarkText(ctx, canvas.width, canvas.height, W, H, sideBorder, topBorder, bottomBorder, timeFont, infoFont, smallFont, iconSize, padding);
}

function drawWatermarkText(ctx, cW, cH, imgW, imgH, sideB, topB, bottomB, timeFont, infoFont, smallFont, iconSize, padding) {
  const time = document.getElementById('inputTime').value || formatTime(new Date());
  const type = document.getElementById('inputType').value || '现场核查';
  const location = document.getElementById('inputLocation').value || '未填写地点';
  const lat = document.getElementById('inputLat').value;
  const lng = document.getElementById('inputLng').value;
  const device = document.getElementById('inputDevice').value || 'iPhone 13 Pro';
  const note = document.getElementById('inputNote').value;

  const textAreaY = topB + imgH;
  const leftX = sideB + padding;
  const rightX = sideB + imgW - padding;
  const maxTextWidth = rightX - leftX - iconSize - padding * 0.5;

  const lineHeight = 1.6;
  let currentY = textAreaY + padding;

  const colorPrimary = '#2563EB';
  const colorText1 = '#0F172A';
  const colorText2 = '#334155';
  const colorText3 = '#64748B';
  const colorLine = '#E2E8F0';

  drawIconDot(ctx, leftX, currentY + (timeFont - iconSize)/2, iconSize, colorPrimary);
  ctx.fillStyle = colorText1;
  ctx.font = `700 ${timeFont}px 'JetBrains Mono', monospace`;
  ctx.textAlign = 'left';
  ctx.textBaseline = 'top';
  ctx.fillText(time, leftX + iconSize + padding * 0.5, currentY);
  currentY += timeFont * lineHeight;

  drawIconSquare(ctx, leftX, currentY + (infoFont - iconSize)/2, iconSize, colorPrimary);
  ctx.fillStyle = colorText2;
  ctx.font = `500 ${infoFont}px 'Noto Sans SC', sans-serif`;
  let locText = truncateText(ctx, location, maxTextWidth);
  ctx.fillText(locText, leftX + iconSize + padding * 0.5, currentY);
  currentY += infoFont * lineHeight;

  drawIconTag(ctx, leftX, currentY + (smallFont - iconSize)/2, iconSize, colorPrimary);
  ctx.fillStyle = colorText3;
  ctx.font = `400 ${smallFont}px 'Noto Sans SC', sans-serif`;
  let typeText = type + (note ? ` · ${note}` : '');
  typeText = truncateText(ctx, typeText, maxTextWidth);
  ctx.fillText(typeText, leftX + iconSize + padding * 0.5, currentY);
  currentY += smallFont * lineHeight + 10;

  ctx.strokeStyle = colorLine;
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(leftX, currentY);
  ctx.lineTo(rightX, currentY);
  ctx.stroke();
  currentY += 15;

  ctx.fillStyle = colorText3;
  ctx.font = `400 ${smallFont}px 'Noto Sans SC', sans-serif`;
  ctx.textBaseline = 'top';
  
  ctx.textAlign = 'left';
  let devText = truncateText(ctx, device, (rightX - leftX) / 2 - iconSize - padding * 0.5);
  ctx.fillText(devText, leftX, currentY);

  ctx.textAlign = 'right';
  let coordText = '';
  if(lat && lng) coordText = `${formatCoord(lat, 'N')} ${formatCoord(lng, 'E')}`;
  if(coordText) {
    coordText = truncateText(ctx, coordText, (rightX - leftX) / 2);
    ctx.fillText(coordText, rightX, currentY);
  }
}

function truncateText(ctx, text, maxWidth){
  if(ctx.measureText(text).width <= maxWidth) return text;
  let truncated = text;
  while(ctx.measureText(truncated + '...').width > maxWidth && truncated.length > 0){
    truncated = truncated.slice(0, -1);
  }
  return truncated + '...';
}

function formatCoord(val, dir){
  const v = parseFloat(val);
  if(isNaN(v)) return val;
  const abs = Math.abs(v);
  const d = Math.floor(abs);
  const m = ((abs - d) * 60).toFixed(2);
  return `${d}°${m}'${dir}`;
}

function saveImage(){
  const canvas = document.getElementById('resultCanvas');
  canvas.toBlob(blob => {
    if(!blob){ showToast('生成图片失败', 'error'); return; }
    state.lastBlob = blob;
    shareImage(blob);
  }, 'image/jpeg', 0.95);
}

async function shareImage(blob){
  const file = new File([blob], `WorkRecord_${Date.now()}.jpg`, { type: 'image/jpeg' });
  
  if (navigator.canShare && navigator.canShare({ files: [file] })) {
    try {
      await navigator.share({
        files: [file],
        title: '工作水印照片',
        text: '工作记录照片'
      });
      showToast('已通过系统分享保存', 'success');
    } catch (err) {
      if (err.name !== 'AbortError') {
        console.error('分享失败:', err);
        fallbackSave(blob);
      }
    }
  } else {
    fallbackSave(blob);
  }
}

function fallbackSave(blob){
  const url = URL.createObjectURL(blob);
  document.getElementById('savePreviewImg').src = url;
  document.getElementById('saveOverlay').classList.add('show');
}

function showToast(msg, type){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show' + (type ? ' ' + type : '');
  clearTimeout(t._timer);
  t._timer = setTimeout(() => t.classList.remove('show'), 2500);
}

window.addEventListener('load', init);
document.addEventListener('touchmove', e => {
  if(e.target.closest('.edit-sheet')) return;
  if(e.target.closest('.preview-area')) return;
  if(e.target.closest('.save-overlay')) return;
  e.preventDefault();
}, { passive: false });
</script>
