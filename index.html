<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>地理区域选择器 · GeoJSON Selector</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@turf/turf@6.5.0/turf.min.js"></script>
<style>
  :root {
    --bg: #f4f5f7; --bg-soft: #ffffff;
    --panel: #ffffff; --panel-2: #f0f2f5;
    --border: #e4e7ed; --border-strong: #cdd3dc;
    --fg: #1a1f2e; --fg-soft: #4a5568; --fg-muted: #8b95a5;
    --accent: #b07d3a; --accent-light: #d4a574; --accent-soft: rgba(176,125,58,0.08);
    --accent-2: #4a9d9d; --accent-2-soft: rgba(74,157,157,0.08);
    --danger: #d4675c; --danger-soft: rgba(212,103,92,0.08);
    --success: #6b9e54;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{
    font-family:'Noto Sans SC',-apple-system,sans-serif;
    background:var(--bg); color:var(--fg);
    height:100vh; overflow:hidden;
    background-image:
      radial-gradient(ellipse 800px 600px at 20% 0%, rgba(176,125,58,0.04), transparent),
      radial-gradient(ellipse 600px 400px at 80% 100%, rgba(74,157,157,0.04), transparent),
      linear-gradient(180deg, var(--bg) 0%, #ebeef2 100%);
  }
  body::before{
    content:''; position:fixed; inset:0; pointer-events:none; z-index:0;
    background-image:
      linear-gradient(rgba(0,0,0,0.02) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,0,0,0.02) 1px, transparent 1px);
    background-size:40px 40px;
  }

  /* ========== Header ========== */
  header{
    height:60px; border-bottom:1px solid var(--border);
    display:flex; align-items:center; justify-content:space-between;
    padding:0 24px;
    background:rgba(255,255,255,0.8); backdrop-filter:blur(10px);
    position:relative; z-index:10;
  }
  header .brand{display:flex; align-items:center; gap:12px}
  .brand-mark{
    width:32px; height:32px; border-radius:6px; position:relative;
    background:linear-gradient(135deg, var(--accent-light), var(--accent-2));
  }
  .brand-mark::after{content:''; position:absolute; inset:4px; background:var(--bg-soft); border-radius:3px}
  .brand-mark::before{content:''; position:absolute; inset:8px; background:linear-gradient(135deg, var(--accent-light), var(--accent-2)); border-radius:1px}
  header h1{font-size:16px; font-weight:500; letter-spacing:0.5px}
  header h1 .sub{color:var(--fg-muted); font-weight:300; margin-left:8px; font-size:13px}
  .header-actions{display:flex; gap:8px}

  /* ========== Layout ========== */
  .layout{
    display:grid; grid-template-columns:300px 1fr 300px;
    height:calc(100vh - 60px); position:relative; z-index:1;
    transition:grid-template-columns 0.25s ease;
  }
  .layout.collapsed-left{grid-template-columns:0px 1fr 300px}
  .layout.collapsed-right{grid-template-columns:300px 1fr 0px}
  .layout.collapsed-left.collapsed-right{grid-template-columns:0px 1fr 0px}
  aside{
    background:var(--panel); border-right:1px solid var(--border);
    overflow-y:auto; padding:20px; position:relative;
    transition:opacity 0.2s ease, padding 0.2s ease;
    min-width:0;
  }
  aside.right{border-right:none; border-left:1px solid var(--border)}
  .layout.collapsed-left aside.left,
  .layout.collapsed-right aside.right{
    opacity:0; padding:0; pointer-events:none; overflow:hidden;
  }
  .sidebar-toggle{
    position:absolute; top:50%; transform:translateY(-50%);
    width:22px; height:52px; border:1px solid var(--border);
    background:var(--panel); color:var(--fg-muted);
    cursor:pointer; z-index:1000;
    display:flex; align-items:center; justify-content:center;
    font-size:16px; transition:all 0.15s;
    box-shadow:0 1px 6px rgba(0,0,0,0.12);
  }
  .sidebar-toggle:hover{color:var(--accent); border-color:var(--accent); background:var(--accent-soft)}
  .sidebar-toggle.left-btn{left:0; border-radius:0 6px 6px 0; border-left:none}
  .sidebar-toggle.right-btn{right:0; border-radius:6px 0 0 6px; border-right:none}

  /* ========== Map View ========== */
  .map-view{position:relative; background:var(--bg-soft); overflow:hidden}
  #map{width:100%; height:100%; background:var(--bg-soft)}
  .leaflet-control-attribution{display:none !important}
  .leaflet-control-zoom{border:none !important; box-shadow:0 2px 8px rgba(0,0,0,0.08) !important}
  .leaflet-control-zoom a{background:rgba(255,255,255,0.9) !important; color:var(--fg-soft) !important; border-color:var(--border) !important}
  .leaflet-control-zoom a:hover{background:var(--accent-soft) !important; color:var(--accent) !important}
  .leaflet-tooltip{
    background:rgba(255,255,255,0.95) !important; color:var(--fg) !important;
    border:1px solid var(--border) !important; border-radius:4px !important;
    font-size:12px !important; font-family:inherit !important;
    box-shadow:0 2px 8px rgba(0,0,0,0.08) !important;
  }
  .empty-state{
    position:absolute; inset:0; display:flex; flex-direction:column;
    align-items:center; justify-content:center;
    color:var(--fg-muted); pointer-events:none; z-index:500;
  }
  .empty-state .glyph{
    width:80px; height:80px; border:2px dashed var(--border-strong);
    border-radius:12px; display:flex; align-items:center; justify-content:center;
    margin-bottom:16px; opacity:0.6;
  }
  .selection-info{
    position:absolute; top:12px; right:12px; z-index:999;
    background:rgba(255,255,255,0.9); backdrop-filter:blur(8px);
    border:1px solid var(--border); border-radius:6px;
    padding:8px 14px; font-size:13px; color:var(--fg-soft);
    box-shadow:0 2px 8px rgba(0,0,0,0.06);
  }
  .selection-info .count{color:var(--accent); font-weight:600; font-size:15px; font-family:'JetBrains Mono',monospace}

  /* ========== Section ========== */
  .section-title{
    font-size:11px; text-transform:uppercase; letter-spacing:1.5px;
    color:var(--fg-muted); margin-bottom:12px; display:flex; align-items:center; gap:8px;
  }
  .section-title::after{content:''; flex:1; height:1px; background:var(--border)}
  .section-title .count-tag{color:var(--fg-muted); font-family:'JetBrains Mono',monospace; font-size:10px; letter-spacing:0}
  .section-block{margin-bottom:24px}

  /* ========== Upload Zone ========== */
  .upload-zone{
    border:1.5px dashed var(--border-strong); border-radius:8px;
    padding:24px 16px; text-align:center; cursor:pointer;
    transition:all 0.2s ease; margin-bottom:12px;
    background:var(--panel-2);
  }
  .upload-zone:hover, .upload-zone.dragover{
    border-color:var(--accent); background:var(--accent-soft);
  }
  .upload-zone .icon{font-size:22px; color:var(--fg-muted); margin-bottom:6px}
  .upload-zone .title{font-size:13px; color:var(--fg-soft); margin-bottom:4px}
  .upload-zone .hint{font-size:11px; color:var(--fg-muted)}

  /* ========== Inputs ========== */
  .input-group{margin-bottom:12px}
  .input-group label{display:block; font-size:11px; color:var(--fg-muted); margin-bottom:6px; text-transform:uppercase; letter-spacing:0.5px}
  textarea, input[type="text"]{
    width:100%; padding:8px 10px; background:var(--panel-2);
    border:1px solid var(--border); color:var(--fg);
    border-radius:6px; font-size:12px; font-family:'JetBrains Mono',monospace; resize:vertical;
    transition:border-color 0.15s;
  }
  textarea{height:70px}
  textarea:focus, input:focus{outline:none; border-color:var(--accent)}
  .api-row{display:flex; gap:6px}
  .api-row input{flex:1}

  /* ========== Paste Area ========== */
  .paste-area{margin-top:8px; display:none}
  .paste-area.open{display:block}

  /* ========== Buttons ========== */
  .btn{
    padding:8px 14px; background:var(--panel-2); border:1px solid var(--border-strong);
    color:var(--fg); border-radius:6px; cursor:pointer; font-size:13px;
    font-family:inherit; transition:all 0.15s ease;
    display:inline-flex; align-items:center; justify-content:center; gap:6px;
  }
  .btn:hover{border-color:var(--accent); color:var(--accent)}
  .btn.primary{background:var(--accent); border-color:var(--accent); color:#fff; font-weight:500}
  .btn.primary:hover{background:var(--accent-light); color:#fff}
  .btn.secondary{background:var(--accent-2); border-color:var(--accent-2); color:#fff; font-weight:500}
  .btn.secondary:hover{background:#5db0b0; color:#fff}
  .btn.full{width:100%}
  .btn.sm{padding:5px 8px; font-size:11px; border-radius:4px; border:1px solid var(--border); background:var(--panel-2); color:var(--fg-soft)}
  .btn.sm:hover{border-color:var(--accent); color:var(--accent)}
  .btn.sm.danger:hover{border-color:var(--danger); color:var(--danger)}
  .btn-group{display:flex; gap:6px}
  .btn-group .btn{flex:1}

  /* ========== Layer List ========== */
  .layer-list{display:flex; flex-direction:column; gap:8px}
  .layer-block{
    background:var(--panel-2); border:1px solid var(--border);
    border-radius:8px; overflow:hidden; transition:border-color 0.15s;
  }
  .layer-block:hover{border-color:var(--border-strong)}
  .layer-block.hidden-layer{opacity:0.5}
  .layer-header{
    display:flex; align-items:center; gap:10px; padding:12px; cursor:pointer;
  }
  .vis-toggle{
    width:18px; height:18px; display:flex; align-items:center; justify-content:center;
    cursor:pointer; color:var(--accent); font-size:13px; flex-shrink:0;
    border-radius:50%; transition:background 0.15s;
  }
  .vis-toggle:hover{background:var(--accent-soft)}
  .layer-color-swatch{
    width:18px; height:18px; border-radius:4px; flex-shrink:0;
    border:1.5px solid rgba(0,0,0,0.1); cursor:pointer; position:relative;
  }
  .layer-color-swatch input{position:absolute; inset:0; opacity:0; cursor:pointer}
  .layer-info{flex:1; min-width:0}
  .layer-name{font-size:13px; color:var(--fg); overflow:hidden; text-overflow:ellipsis; white-space:nowrap}
  .layer-stats{font-size:10px; color:var(--fg-muted); font-family:'JetBrains Mono',monospace}
  .layer-stats .sel{color:var(--accent); font-weight:500}
  .chevron{
    color:var(--fg-muted); font-size:12px; transition:transform 0.2s;
    flex-shrink:0; width:16px; text-align:center;
  }
  .layer-block[data-expanded="true"] .chevron{transform:rotate(90deg)}
  .del-btn{
    background:none; border:none; color:var(--fg-muted);
    cursor:pointer; font-size:14px; padding:4px 6px; border-radius:4px;
    transition:all 0.15s; flex-shrink:0;
  }
  .del-btn:hover{color:var(--danger); background:var(--danger-soft)}
  .layer-body{display:none}
  .layer-block[data-expanded="true"] .layer-body{display:block}
  .layer-actions{
    display:flex; gap:6px; padding:8px 12px;
    border-top:1px solid var(--border); background:var(--panel);
  }
  .layer-actions .btn.sm{flex:1}
  .feature-list{
    max-height:200px; overflow-y:auto; background:var(--panel);
    border-top:1px solid var(--border);
  }
  .feature-item{
    display:flex; align-items:center; gap:8px; padding:7px 12px; cursor:pointer;
    font-size:12px; color:var(--fg-soft); transition:background 0.15s;
  }
  .feature-item:hover{background:var(--accent-soft)}
  .feature-item.selected{color:var(--accent); font-weight:500; background:var(--accent-soft)}
  .feature-item .checkbox{
    width:14px; height:14px; border:1.5px solid var(--border-strong);
    border-radius:3px; flex-shrink:0; position:relative; background:var(--panel-2);
    transition:all 0.15s;
  }
  .feature-item.selected .checkbox{background:var(--accent); border-color:var(--accent)}
  .feature-item.selected .checkbox::after{
    content:''; position:absolute; left:3px; top:0px; width:5px; height:9px;
    border:solid #fff; border-width:0 2px 2px 0; transform:rotate(45deg);
  }

  /* ========== Settings ========== */
  .setting-row{margin-bottom:12px}
  .setting-row label{
    display:flex; align-items:center; gap:10px; font-size:13px;
    color:var(--fg-soft); cursor:pointer;
  }
  .setting-row input[type=checkbox]{
    appearance:none; width:16px; height:16px;
    border:1.5px solid var(--border-strong); border-radius:3px;
    cursor:pointer; position:relative; background:var(--panel-2); flex-shrink:0;
    transition:all 0.15s;
  }
  .setting-row input[type=checkbox]:checked{background:var(--accent); border-color:var(--accent)}
  .setting-row input[type=checkbox]:checked::after{
    content:''; position:absolute; left:3px; top:0px; width:5px; height:9px;
    border:solid #fff; border-width:0 2px 2px 0; transform:rotate(45deg);
  }
  .setting-row select{
    background:var(--panel-2); border:1px solid var(--border); color:var(--fg);
    padding:7px 10px; border-radius:6px; font-size:12px;
    font-family:inherit; width:100%; cursor:pointer;
  }
  .setting-row select:focus{outline:none; border-color:var(--accent)}

  /* ========== Info Block ========== */
  .info-block{
    background:var(--panel-2); border:1px solid var(--border);
    border-radius:8px; padding:12px;
    font-family:'JetBrains Mono',monospace; font-size:11px;
    line-height:1.7; color:var(--fg-soft);
  }
  .info-block .label{color:var(--fg-muted)}
  .info-block .value{color:var(--accent)}

  /* ========== Prompt Template ========== */
  .prompt-box{
    background:var(--panel-2); border:1px solid var(--border);
    border-radius:8px; padding:10px;
  }
  .prompt-box textarea{
    height:80px; background:var(--panel); border:1px solid var(--border);
    margin-bottom:8px; font-family:'Noto Sans SC',sans-serif; font-size:12px;
    line-height:1.6;
  }
  .prompt-box textarea:focus{border-color:var(--accent)}
  .prompt-note{font-size:11px; color:var(--fg-muted); line-height:1.6; margin-top:8px}
  .prompt-note a{color:var(--accent-2); text-decoration:none}
  .prompt-note a:hover{text-decoration:underline}

  /* ========== Preview Modal ========== */
  .preview-overlay{
    position:fixed; inset:0; background:rgba(0,0,0,0.5);
    z-index:9998; display:none; align-items:center; justify-content:center;
    backdrop-filter:blur(4px);
  }
  .preview-overlay.open{display:flex}
  .preview-modal{
    background:var(--panel); border:1px solid var(--border);
    border-radius:12px; box-shadow:0 8px 40px rgba(0,0,0,0.2);
    width:90vw; max-width:900px; max-height:85vh;
    display:flex; flex-direction:column; overflow:hidden;
    animation:previewIn 0.2s ease;
  }
  @keyframes previewIn{from{opacity:0; transform:scale(0.96)} to{opacity:1; transform:scale(1)}}
  .preview-header{
    display:flex; align-items:center; justify-content:space-between;
    padding:16px 20px; border-bottom:1px solid var(--border);
  }
  .preview-header h2{font-size:15px; font-weight:500; color:var(--fg)}
  .preview-header .badge{
    font-size:11px; color:var(--accent); background:var(--accent-soft);
    padding:2px 8px; border-radius:4px; margin-left:8px;
    font-family:'JetBrains Mono',monospace;
  }
  .preview-close{
    background:none; border:none; color:var(--fg-muted);
    cursor:pointer; font-size:20px; padding:4px 8px; border-radius:4px;
  }
  .preview-close:hover{color:var(--danger); background:var(--danger-soft)}
  .preview-body{
    flex:1; overflow:auto; padding:20px;
    background:var(--panel-2); display:flex; align-items:center; justify-content:center;
    min-height:300px;
  }
  .preview-body img{
    max-width:100%; max-height:60vh; object-fit:contain;
    border:1px solid var(--border); border-radius:8px;
    background:#fff; box-shadow:0 2px 12px rgba(0,0,0,0.08);
  }
  .preview-footer{
    display:flex; align-items:center; justify-content:space-between;
    padding:14px 20px; border-top:1px solid var(--border); gap:12px;
  }
  .preview-info{font-size:12px; color:var(--fg-muted); font-family:'JetBrains Mono',monospace}
  .preview-actions{display:flex; gap:8px}

  /* ========== Toast ========== */
  .toast-container{
    position:fixed; bottom:24px; left:50%; transform:translateX(-50%);
    z-index:9999; display:flex; flex-direction:column; gap:8px; pointer-events:none;
  }
  .toast{
    background:var(--panel); border:1px solid var(--border-strong);
    color:var(--fg); padding:10px 18px; border-radius:8px; font-size:13px;
    box-shadow:0 4px 20px rgba(0,0,0,0.1);
    animation:toastIn 0.25s ease;
  }
  .toast.success{border-left:3px solid var(--success)}
  .toast.error{border-left:3px solid var(--danger)}
  .toast.info{border-left:3px solid var(--accent-2)}
  @keyframes toastIn{from{opacity:0; transform:translateY(10px)} to{opacity:1; transform:translateY(0)}}

  /* ========== Scrollbar ========== */
  ::-webkit-scrollbar{width:6px; height:6px}
  ::-webkit-scrollbar-track{background:transparent}
  ::-webkit-scrollbar-thumb{background:var(--border-strong); border-radius:3px}
  ::-webkit-scrollbar-thumb:hover{background:var(--fg-muted)}

  #fileInput{display:none}
  .note{font-size:11px; color:var(--fg-muted); line-height:1.7}
  .note a{color:var(--accent-2); text-decoration:none}
  .note a:hover{text-decoration:underline}
  .note b{color:var(--accent)}
</style>
</head>
<body>

<header>
  <div class="brand">
    <div class="brand-mark"></div>
    <h1>地理区域选择器<span class="sub">GeoJSON Selector</span></h1>
  </div>
  <div class="header-actions">
    <button class="btn" onclick="loadSample()">载入示例</button>
    <button class="btn" onclick="clearAll()">清空</button>
  </div>
</header>

<div class="layout" id="mainLayout">
  <!-- ========== Left Sidebar ========== -->
  <aside class="left">
    <div class="section-block">
      <div class="section-title">数据导入</div>
      <div class="upload-zone" id="uploadZone">
        <div class="icon">⬆</div>
        <div class="title">拖入 GeoJSON 文件</div>
        <div class="hint">支持 .geojson / .json，可多选</div>
      </div>
      <input type="file" id="fileInput" accept=".json,.geojson" multiple>

      <div class="input-group">
        <label>API 地址或 Adcode</label>
        <div class="api-row">
          <input type="text" id="apiUrl" placeholder="如 510000" onkeypress="if(event.key==='Enter')addFromApi()">
          <button class="btn sm" onclick="addFromApi()">获取</button>
        </div>
      </div>

      <button class="btn full" onclick="togglePasteArea()" id="pasteToggle" style="font-size:12px;">粘贴 JSON 文本</button>
      <div class="paste-area" id="pasteArea">
        <div class="input-group" style="margin-top:8px;">
          <textarea id="geojsonText" placeholder='{"type":"FeatureCollection",...}'></textarea>
          <button class="btn sm full" onclick="addFromText()" style="margin-top:6px;">添加为图层</button>
        </div>
      </div>
    </div>

    <div class="section-block">
      <div class="section-title">图层 <span class="count-tag" id="layerCountTag"></span></div>
      <div class="layer-list" id="layerList">
        <div style="font-size:12px; color:var(--fg-muted); text-align:center; padding:20px 0;">暂无图层</div>
      </div>
    </div>
  </aside>

  <!-- ========== Map View ========== -->
  <div class="map-view">
    <button class="sidebar-toggle left-btn" onclick="toggleSidebar('left')" title="收起左侧">‹</button>
    <button class="sidebar-toggle right-btn" onclick="toggleSidebar('right')" title="收起右侧">›</button>
    <div id="map"></div>
    <div class="empty-state" id="emptyState">
      <div class="glyph">
        <svg width="40" height="40" viewBox="0 0 40 40" fill="none" stroke="currentColor" stroke-width="1.5">
          <path d="M20 6 L30 12 L30 26 L20 32 L10 26 L10 12 Z"/>
          <circle cx="20" cy="20" r="3"/>
        </svg>
      </div>
      <div style="font-size:14px; color:var(--fg-soft); margin-bottom:4px;">还没有图层</div>
      <div style="font-size:12px;">从左侧导入 GeoJSON，或点击右上"载入示例"</div>
    </div>
    <div class="selection-info" id="selectionInfo" style="display:none;">
      已选择 <span class="count" id="selectedCount">0</span> 个区域
    </div>
  </div>

  <!-- ========== Right Sidebar ========== -->
  <aside class="right">
    <div class="section-block">
      <div class="section-title">导出设置</div>
      <div class="setting-row">
        <label><input type="checkbox" id="outlineMode" checked>轮廓模式（仅边界线）</label>
      </div>
      <div class="setting-row">
        <label><input type="checkbox" id="groupedMode">按区域分组（PPT友好）</label>
      </div>
      <div class="setting-row">
        <label style="display:block; margin-bottom:6px;">画布比例</label>
        <select id="canvasRatio">
          <option value="original">原始尺寸</option>
          <option value="16:9">16:9（宽屏PPT）</option>
          <option value="4:3">4:3（标准PPT）</option>
          <option value="1:1">1:1（正方形）</option>
        </select>
      </div>
      <div class="setting-row">
        <label style="display:block; margin-bottom:6px;">PNG 分辨率倍数</label>
        <select id="pngScale">
          <option value="1">1x（屏幕预览）</option>
          <option value="2" selected>2x（PPT 标配）</option>
          <option value="3">3x（高清打印）</option>
          <option value="4">4x（超高清）</option>

      <button class="btn primary full" onclick="exportSVG()" style="margin-bottom:8px;">导出 SVG</button>
      <button class="btn full" onclick="exportLineartPNG()" style="margin-bottom:8px;">导出线稿 PNG（AI用）</button>
      <button class="btn secondary full" onclick="exportBatch()">批量导出（SVG + PNG）</button>
    </div>

    <div class="section-block">
      <div class="section-title">AI 提示词模板</div>
      <div class="setting-row">
        <select id="promptPreset" onchange="updatePrompt()">
          <option value="tech">科技感地图</option>
          <option value="watercolor">手绘水彩地图</option>
          <option value="dark">暗色商务地图</option>
          <option value="minimal">极简线框地图</option>
          <option value="vintage">复古纸张地图</option>
          <option value="custom">自定义</option>
        </select>
      </div>
      <div class="prompt-box">
        <textarea id="promptText" placeholder="选择风格预设后自动填充，可自行编辑..."></textarea>
        <button class="btn sm full" onclick="copyPrompt()">复制提示词</button>
      </div>
      <div class="prompt-note">
        <b>使用方法：</b>先用"导出线稿 PNG"生成控制图，上传到即梦 AI / Midjourney 的图生图，再粘贴此提示词。<br><br>
        数据来源：<a href="https://datav.aliyun.com/portal/school/atlas/area_selector" target="_blank">阿里 DataV 地图</a>
      </div>
    </div>
  </aside>
</div>

<div class="toast-container" id="toastContainer"></div>

<!-- ========== Preview Modal ========== -->
<div class="preview-overlay" id="previewOverlay">
  <div class="preview-modal">
    <div class="preview-header">
      <div>
        <h2>导出预览<span class="badge" id="previewBadge">SVG</span></h2>
      </div>
      <button class="preview-close" onclick="closePreview()">✕</button>
    </div>

      <img id="previewImg" alt="预览图">
    </div>

      <div class="preview-info" id="previewInfo">--</div>
      <div class="preview-actions">
        <button class="btn" onclick="closePreview()">取消</button>
        <button class="btn primary" id="previewConfirmBtn" onclick="confirmDownload()">确认下载</button>
      </div>
    </div>

</div>

<script>
// ============ 检测依赖库是否加载成功 ============
if (typeof L === 'undefined') {
  document.getElementById('emptyState').innerHTML = '<div style="font-size:14px; color:#d4675c; margin-bottom:8px; font-weight:500;">Leaflet 地图库加载失败</div><div style="font-size:12px; color:#8b95a5;">请检查网络连接，或尝试刷新页面<br>如果问题持续，请使用 VPN 或更换网络环境</div>';
  throw new Error('Leaflet not loaded');
}

// ============ 初始化 Leaflet 地图 ============
const map = L.map('map', {
  renderer: L.svg(),
  zoomControl: true,
  attributionControl: false
}).setView([30.6, 104.0], 7);

const layers = [];
const colors = ['#d4a574','#5fa8a8','#c8796b','#8b9d77','#b89ac9','#e0c878','#6b8cae','#cf8b7a'];
let layerIdCounter = 0;
let skipPreview = false;

// ============ AI 提示词模板 ============
const promptTemplates = {
  tech: '扁平化地理信息图，矢量插画风，科技蓝色调，clean outline, no shading, infographic map, flat design, vector style, futuristic, data visualization',
  watercolor: '手绘水彩风格地图插图，柔和色调，水彩晕染效果，hand-drawn watercolor map, soft colors, artistic illustration, painterly',
  dark: '暗色主题商务地图，深蓝背景，金色高亮区域，dark theme business map, elegant, professional infographic, premium feel',
  minimal: '极简线框地图，白色背景，细线条，minimalist wireframe map, thin lines, clean white background, simple, elegant',
  vintage: '复古牛皮纸风格地图，做旧效果，warm vintage paper map texture, aged, antique cartography style, sepia tones'
};

function updatePrompt() {
  const preset = document.getElementById('promptPreset').value;
  if (preset !== 'custom' && promptTemplates[preset]) {
    document.getElementById('promptText').value = promptTemplates[preset];
  }
}

function copyPrompt() {
  const text = document.getElementById('promptText').value.trim();
  if (!text) return showToast('提示词为空', 'error');
  navigator.clipboard.writeText(text).then(() => {
    showToast('提示词已复制到剪贴板', 'success');
  }).catch(() => {
    showToast('复制失败，请手动选择复制', 'error');
  });
}

// 初始化默认提示词
document.getElementById('promptText').value = promptTemplates.tech;

// ============ 数据导入 ============
function togglePasteArea() {
  const area = document.getElementById('pasteArea');
  area.classList.toggle('open');
}

function addFromText() {
  const text = document.getElementById('geojsonText').value.trim();
  if (!text) return showToast('请输入 GeoJSON 内容', 'error');
  try {
    const geojson = JSON.parse(text);
    addLayer('粘贴图层', geojson);
    document.getElementById('geojsonText').value = '';
    document.getElementById('pasteArea').classList.remove('open');
  } catch (e) {
    showToast('JSON 格式错误: ' + e.message, 'error');
  }
}

async function addFromApi() {
  let url = document.getElementById('apiUrl').value.trim();
  if (!url) return showToast('请输入 URL 或 Adcode', 'error');

  let adcode = null;
  if (/^\d+$/.test(url)) {
    adcode = url;
    url = `https://geo.datav.aliyun.com/areas_v3/bound/${url}_full.json`;
  }

  try {
    showToast('正在获取数据...', 'info');
    const res = await fetch(url);
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const data = await res.json();
    let name = adcode || url.split('/').pop().replace('.json', '').replace('_full', '');

    // 通过 adcode 加载时，额外获取区域真实名称
    if (adcode) {
      try {
        const nameRes = await fetch(`https://geo.datav.aliyun.com/areas_v3/bound/${adcode}.json`);
        if (nameRes.ok) {
          const nameData = await nameRes.json();
          const feats = nameData.features || [];
          if (feats.length > 0 && feats[0].properties && feats[0].properties.name) {
            name = feats[0].properties.name;
          }
        }
      } catch (e) { /* 获取名称失败，使用 adcode 作为回退 */ }
    }

    addLayer(name, data, adcode);
    document.getElementById('apiUrl').value = '';
  } catch (e) {
    showToast('获取失败: ' + e.message, 'error');
  }
}

function addFromFile(event) {
  handleFiles(event.target.files);
  event.target.value = '';
}

function handleFiles(files) {
  const arr = Array.from(files);
  let ok = 0, pending = arr.length;
  if (pending === 0) return;
  arr.forEach(file => {
    const reader = new FileReader();
    reader.onload = (e) => {
      try {
        const geojson = JSON.parse(e.target.result);
        const name = file.name.replace(/\.(json|geojson)$/i, '');
        addLayer(name, geojson);
        ok++;
      } catch (err) {
        showToast(`解析失败: ${file.name}`, 'error');
      }
      if (--pending === 0 && ok > 0) {
        showToast(`已添加 ${ok} 个图层`, 'success');
      }
    };
    reader.readAsText(file);
  });
}

// 拖放支持
const uploadZone = document.getElementById('uploadZone');
uploadZone.addEventListener('click', () => document.getElementById('fileInput').click());
uploadZone.addEventListener('dragover', (e) => { e.preventDefault(); uploadZone.classList.add('dragover'); });
uploadZone.addEventListener('dragleave', () => uploadZone.classList.remove('dragover'));
uploadZone.addEventListener('drop', (e) => {
  e.preventDefault();
  uploadZone.classList.remove('dragover');
  handleFiles(e.dataTransfer.files);
});
document.getElementById('fileInput').addEventListener('change', addFromFile);

// 全局拖放
document.body.addEventListener('dragover', (e) => e.preventDefault());
document.body.addEventListener('drop', (e) => {
  e.preventDefault();
  if (e.dataTransfer.files.length > 0) handleFiles(e.dataTransfer.files);
});

function loadSample() {
  document.getElementById('apiUrl').value = '510000';
  addFromApi();
}

// ============ 核心：添加图层 ============
function addLayer(name, geojson, adcode) {
  const color = colors[layers.length % colors.length];

  const layerObj = {
    id: ++layerIdCounter,
    name, color, visible: true,
    geojson, adcode,
    features: [],
    isOutline: false
  };

  const layer = L.geoJSON(geojson, {
    style: {
      color: '#555',
      weight: 1,
      fillColor: color,
      fillOpacity: 0.4
    },
    onEachFeature: (feature, lyr) => {
      const props = feature.properties || {};
      const featName = props.name || props.NAME || props.名称 || '未命名区域';
      const fid = String(props.adcode || layerObj.features.length);
      const featObj = { id: fid, name: featName, layer: lyr, selected: false, feature };
      layerObj.features.push(featObj);
      lyr.bindTooltip(featName, { sticky: true });
      lyr.on('click', (e) => {
        toggleFeatureSelect(layerObj.id, fid);
        L.DomEvent.stopPropagation(e);
      });
    }
  }).addTo(map);

  layerObj.layer = layer;
  layerObj.count = layer.getLayers().length;

  // 为 path 添加 data-name 属性（用于分组导出）
  layerObj.features.forEach(f => {
    if (f.layer && f.layer._path) {
      f.layer._path.setAttribute('data-name', f.name);
    }
  });

  if (layer.getLayers().length > 0) {
    map.fitBounds(layer.getBounds().pad(0.1));
  }

  layers.push(layerObj);
  updateLayerList();
  updateSelectionInfo();
  showToast(`已添加 "${name}" (${layerObj.count} 个要素)`, 'success');
}

// ============ 要素选择 ============
function toggleFeatureSelect(layerId, fid) {
  const layerObj = layers.find(l => l.id === layerId);
  if (!layerObj) return;
  const feat = layerObj.features.find(f => f.id === fid);
  if (!feat) return;

  feat.selected = !feat.selected;
  applyFeatureStyle(layerObj, feat);
  updateLayerList();
  updateSelectionInfo();
}

function applyFeatureStyle(layerObj, feat) {
  if (!feat.layer || !feat.layer.setStyle) return;
  if (feat.selected) {
    feat.layer.setStyle({
      color: '#fff', weight: 2.5,
      fillColor: layerObj.color, fillOpacity: 0.85
    });
    feat.layer.bringToFront();
  } else {
    if (layerObj.isOutline) {
      feat.layer.setStyle({ color: '#b07d3a', weight: 2, fillColor: 'transparent', fillOpacity: 0, dashArray: '6,4' });
    } else {
      feat.layer.setStyle({ color: '#555', weight: 1, fillColor: layerObj.color, fillOpacity: 0.3, dashArray: null });
    }
  }
}

function selectAllInLayer(layerId) {
  const layerObj = layers.find(l => l.id === layerId);
  if (!layerObj) return;
  layerObj.features.forEach(f => { f.selected = true; applyFeatureStyle(layerObj, f); });
  updateLayerList(); updateSelectionInfo();
}
function deselectAllInLayer(layerId) {
  const layerObj = layers.find(l => l.id === layerId);
  if (!layerObj) return;
  layerObj.features.forEach(f => { f.selected = false; applyFeatureStyle(layerObj, f); });
  updateLayerList(); updateSelectionInfo();
}
function invertSelectionInLayer(layerId) {
  const layerObj = layers.find(l => l.id === layerId);
  if (!layerObj) return;
  layerObj.features.forEach(f => { f.selected = !f.selected; applyFeatureStyle(layerObj, f); });
  updateLayerList(); updateSelectionInfo();
}

function setLayerColor(layerId, color) {
  const layerObj = layers.find(l => l.id === layerId);
  if (!layerObj) return;
  layerObj.color = color;
  layerObj.features.forEach(f => applyFeatureStyle(layerObj, f));
  updateLayerList();
}

// ============ 轮廓提取 ============
function extractOutline(layerId) {
  const layerObj = layers.find(l => l.id === layerId);
  if (!layerObj || layerObj.features.length === 0) return showToast('该图层没有可提取的要素', 'error');
  if (layerObj.isOutline) return showToast('轮廓图层无法再次提取', 'error');
  if (typeof turf === 'undefined') return showToast('Turf.js 未加载', 'error');

  showToast('正在计算外轮廓...', 'info');

  setTimeout(() => {
    try {
      let merged = null;
      for (const feat of layerObj.features) {
        const geom = feat.feature.geometry;
        if (geom.type !== 'Polygon' && geom.type !== 'MultiPolygon') continue;
        const poly = turf.feature(geom);
        if (!merged) merged = poly;
        else { try { merged = turf.union(merged, poly); } catch (e) { console.warn('跳过:', feat.name); } }
      }
      if (!merged) return showToast('无法计算轮廓', 'error');

      const outlineName = layerObj.name;
      const outlineLayer = L.geoJSON(merged, {
        style: { color: '#b07d3a', weight: 2.5, fillColor: 'transparent', fillOpacity: 0, dashArray: '6,4' }
      }).addTo(map);

      const newLayer = {
        id: ++layerIdCounter, name: outlineName, color: '#b07d3a',
        visible: true, geojson: merged, adcode: null, features: [],
        layer: outlineLayer, count: 1, isOutline: true
      };

      const olFeat = {
        id: 'outline', name: outlineName,
        layer: outlineLayer.getLayers()[0], selected: true, feature: merged
      };
      newLayer.features.push(olFeat);
      if (olFeat.layer && olFeat.layer.setStyle) {
        olFeat.layer.setStyle({ color: '#b07d3a', weight: 3, fillColor: 'transparent', fillOpacity: 0 });
        olFeat.layer.bringToFront();
        if (olFeat.layer._path) olFeat.layer._path.setAttribute('data-name', outlineName);
      }

      layers.push(newLayer);
      updateLayerList(); updateSelectionInfo();
      showToast(`已提取 "${outlineName}"`, 'success');
    } catch (e) {
      showToast('轮廓计算失败: ' + e.message, 'error');
    }
  }, 100);
}

// ============ 图层列表渲染 ============
function updateLayerList() {
  const list = document.getElementById('layerList');
  document.getElementById('layerCountTag').textContent = layers.length ? `${layers.length}` : '';
  document.getElementById('emptyState').style.display = layers.length === 0 ? 'flex' : 'none';

  if (layers.length === 0) {
    list.innerHTML = '<div style="font-size:12px; color:var(--fg-muted); text-align:center; padding:20px 0;">暂无图层</div>';
    return;
  }

  list.innerHTML = layers.map(item => {
    const selCount = item.features.filter(f => f.selected).length;
    const featuresHtml = item.features.map(f => `
      <div class="feature-item ${f.selected ? 'selected' : ''}" onclick="toggleFeatureSelect(${item.id}, '${f.id}')">
        <div class="checkbox"></div>
        <span>${f.name}</span>
      </div>
    `).join('');

    const actionsHtml = item.isOutline ? '' : `
      <div class="layer-actions">
        <button class="btn sm" onclick="selectAllInLayer(${item.id})">全选</button>
        <button class="btn sm" onclick="invertSelectionInLayer(${item.id})">反选</button>
        <button class="btn sm" onclick="extractOutline(${item.id})">轮廓</button>
        <button class="btn sm danger" onclick="deselectAllInLayer(${item.id})">清除</button>
      </div>
    `;

    return `
      <div class="layer-block ${item.visible ? '' : 'hidden-layer'}" data-expanded="true">
        <div class="layer-header" onclick="toggleFeatureList(this)">
          <span class="vis-toggle" onclick="event.stopPropagation(); toggleLayer(${item.id})">${item.visible ? '●' : '○'}</span>
          <div class="layer-color-swatch" style="background:${item.color}" onclick="event.stopPropagation()">
            <input type="color" value="${item.color}" onchange="setLayerColor(${item.id}, this.value)">
          </div>
          <div class="layer-info">
            <div class="layer-name">${item.name}</div>
            <div class="layer-stats">${item.count} ft${selCount > 0 ? ` · <span class="sel">SEL ${selCount}</span>` : ''}</div>
          </div>
          <span class="chevron">▸</span>
          <button class="del-btn" onclick="event.stopPropagation(); deleteLayer(${item.id})">✕</button>
        </div>
        <div class="layer-body">
          ${actionsHtml}
          <div class="feature-list">${featuresHtml}</div>
        </div>
      </div>
    `;
  }).join('');
}

function toggleFeatureList(headerEl) {
  const block = headerEl.closest('.layer-block');
  const expanded = block.getAttribute('data-expanded') === 'true';
  block.setAttribute('data-expanded', expanded ? 'false' : 'true');
}

function toggleLayer(layerId) {
  const item = layers.find(l => l.id === layerId);
  if (!item) return;
  if (item.visible) { map.removeLayer(item.layer); item.visible = false; }
  else { item.layer.addTo(map); item.visible = true; }
  updateLayerList();
}

function deleteLayer(layerId) {
  const idx = layers.findIndex(l => l.id === layerId);
  if (idx === -1) return;
  map.removeLayer(layers[idx].layer);
  const name = layers[idx].name;
  layers.splice(idx, 1);
  updateLayerList(); updateSelectionInfo();
  showToast(`已删除 "${name}"`, 'info');
}

function clearAll() {
  layers.forEach(item => map.removeLayer(item.layer));
  layers.length = 0;
  updateLayerList(); updateSelectionInfo();
  showToast('已清空所有图层', 'info');
}

// ============ 选择状态 ============
function updateSelectionInfo() {
  const total = layers.reduce((sum, l) => sum + l.features.filter(f => f.selected).length, 0);
  document.getElementById('selectedCount').textContent = total;
  const info = document.getElementById('selectionInfo');
  const hint = document.getElementById('exportHint');

  if (total > 0) {
    info.style.display = 'block';
    hint.textContent = `将导出 ${total} 个选中区域`;
    hint.style.color = 'var(--accent)';
  } else {
    info.style.display = 'none';
    hint.textContent = '未选择要素，将导出全部';
    hint.style.color = 'var(--fg-muted)';
  }
}

// ============ 导出前准备 ============
function prepareForExport() {
  const selectedFeatures = [];
  layers.forEach(l => l.features.forEach(f => { if (f.selected) selectedFeatures.push(f); }));

  // 确保 path 有 data-name
  layers.forEach(layerObj => {
    layerObj.features.forEach(f => {
      if (f.layer && f.layer._path) {
        f.layer._path.setAttribute('data-name', f.name);
      }
    });
  });

  if (selectedFeatures.length === 0) {
    return { selectedFeatures: [], removed: [] };
  }

  // 临时移除未选中
  const removed = [];
  layers.forEach(layerObj => {
    layerObj.features.forEach(feat => {
      if (!feat.selected && feat.layer) {
        layerObj.layer.removeLayer(feat.layer);
        removed.push({ layerGroup: layerObj.layer, layer: feat.layer });
      }
    });
  });

  return { selectedFeatures, removed };
}

function restoreAfterExport(removed, selectedFeatures) {
  removed.forEach(({ layerGroup, layer }) => layerGroup.addLayer(layer));
  // 重新设置 data-name（removeLayer/addLayer 后 path 会重建）
  layers.forEach(layerObj => {
    layerObj.features.forEach(f => {
      if (f.layer && f.layer._path) {
        f.layer._path.setAttribute('data-name', f.name);
      }
      applyFeatureStyle(layerObj, f);
    });
  });
}

// ============ 核心：导出 SVG ============
function exportSVG() {
  if (layers.length === 0) return showToast('没有可导出的地图', 'error');

  const { selectedFeatures, removed } = prepareForExport();
  const count = selectedFeatures.length;

  if (count === 0) {
    showToast('正在导出全部...', 'info');
    setTimeout(() => doExportSVG(0), 100);
    return;
  }

  showToast(`正在导出 ${count} 个区域...`, 'info');

  const bounds = L.latLngBounds([]);
  selectedFeatures.forEach(feat => {
    if (feat.layer && feat.layer.getBounds) bounds.extend(feat.layer.getBounds());
  });

  let done = false;
  const doExport = () => {
    if (done) return;
    done = true;
    setTimeout(() => {
      doExportSVG(count);
      restoreAfterExport(removed, selectedFeatures);
    }, 400);
  };

  if (bounds.isValid()) {
    map.fitBounds(bounds.pad(0.15));
    map.once('moveend', doExport);
    setTimeout(doExport, 1000);
  } else {
    doExport();
  }
}

function doExportSVG(selectedCount) {
  const svgElement = document.querySelector('#map svg');
  if (!svgElement) return showToast('未找到 SVG 元素', 'error');

  const clone = svgElement.cloneNode(true);
  clone.setAttribute('xmlns', 'http://www.w3.org/2000/svg');
  clone.setAttribute('xmlns:xlink', 'http://www.w3.org/1999/xlink');

  const size = map.getSize();
  const outlineMode = document.getElementById('outlineMode').checked;
  const groupedMode = document.getElementById('groupedMode').checked;
  const ratio = document.getElementById('canvasRatio').value;

  // 关键修复：保留 Leaflet 原始 viewBox
  // Leaflet 路径坐标基于地图像素原点（大数字），viewBox 含偏移量
  // 不能覆盖为 0 0 W H，否则路径在可视区域外
  const originalViewBox = svgElement.getAttribute('viewBox');
  if (!originalViewBox) return showToast('无法获取地图 viewBox', 'error');
  const origVbParts = originalViewBox.split(/\s+/).map(parseFloat);
  let vbX = origVbParts[0], vbY = origVbParts[1];
  let vbW = origVbParts[2], vbH = origVbParts[3];

  // 移除 Leaflet 的 CSS 样式（含 transform 等，独立渲染时无效）
  clone.removeAttribute('style');
  clone.removeAttribute('class');

  // 比例调整：扩展 viewBox（不移动内容，只扩大可视区域）
  const padding = 40;
  if (ratio !== 'original') {
    const ratioMap = { '16:9': 16/9, '4:3': 4/3, '1:1': 1 };
    const targetRatio = ratioMap[ratio];
    if (vbW / vbH > targetRatio) {
      const newH = vbW / targetRatio;
      vbY -= (newH - vbH) / 2 + padding;
      vbH = newH + padding * 2;
      vbX -= padding;
      vbW += padding * 2;
    } else {
      const newW = vbH * targetRatio;
      vbX -= (newW - vbW) / 2 + padding;
      vbW = newW + padding * 2;
      vbY -= padding;
      vbH += padding * 2;
    }
  }

  clone.setAttribute('width', vbW);
  clone.setAttribute('height', vbH);
  clone.setAttribute('viewBox', `${vbX} ${vbY} ${vbW} ${vbH}`);

  // 白色背景（用显式坐标覆盖整个 viewBox 区域）
  const bgRect = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
  bgRect.setAttribute('x', vbX);
  bgRect.setAttribute('y', vbY);
  bgRect.setAttribute('width', vbW);
  bgRect.setAttribute('height', vbH);
  bgRect.setAttribute('fill', '#ffffff');
  clone.insertBefore(bgRect, clone.firstChild);

  // 按区域分组
  if (groupedMode) {
    const g = clone.querySelector('g');
    if (g) {
      const paths = Array.from(g.querySelectorAll('path'));
      const groups = {};
      paths.forEach(p => {
        const name = p.getAttribute('data-name') || 'region';
        const safeName = name.replace(/[^a-zA-Z0-9\u4e00-\u9fa5_-]/g, '_');
        if (!groups[safeName]) {
          const newG = document.createElementNS('http://www.w3.org/2000/svg', 'g');
          newG.setAttribute('id', safeName);
          newG.setAttribute('data-name', name);
          g.appendChild(newG);
          groups[safeName] = newG;
        }
        groups[safeName].appendChild(p);
      });
    }
  }

  // 轮廓模式
  if (outlineMode) {
    const paths = clone.querySelectorAll('path');
    paths.forEach(p => {
      p.setAttribute('fill', 'none');
      p.setAttribute('fill-opacity', '0');
      p.setAttribute('stroke', '#333333');
      p.setAttribute('stroke-width', '1');
      p.removeAttribute('stroke-dasharray');
    });
  }

  const svgData = new XMLSerializer().serializeToString(clone);
  const blob = new Blob([svgData], { type: 'image/svg+xml;charset=utf-8' });
  const url = URL.createObjectURL(blob);

  const modeTag = outlineMode ? 'outline' : (selectedCount > 0 ? 'selected_' + selectedCount : 'all');
  const fileName = `geojson_${modeTag}_${Date.now()}.svg`;
  const modeText = outlineMode ? '轮廓' : '彩色';
  const infoText = `${selectedCount > 0 ? selectedCount + ' 个区域' : '全部'} · ${modeText} · ${ratio === 'original' ? '原始尺寸' : ratio}`;

  const doDownload = () => {
    const a = document.createElement('a');
    a.href = url;
    a.download = fileName;
    a.click();
    URL.revokeObjectURL(url);
    showToast(selectedCount > 0 ? `已导出 ${selectedCount} 个区域 (${modeText}SVG)` : `SVG 已导出 (${modeText})`, 'success');
  };

  if (skipPreview) {
    doDownload();
  } else {
    showPreview(url, 'SVG', fileName, infoText, doDownload);
  }
}

// ============ 导出线稿 PNG ============
function exportLineartPNG() {
  if (layers.length === 0) return showToast('没有可导出的地图', 'error');

  const { selectedFeatures, removed } = prepareForExport();
  const count = selectedFeatures.length;

  let done = false;
  const doExport = () => {
    if (done) return;
    done = true;
    setTimeout(() => {
      doExportLineartPNG(count);
      restoreAfterExport(removed, selectedFeatures);
    }, 400);
  };

  if (count > 0) {
    const bounds = L.latLngBounds([]);
    selectedFeatures.forEach(feat => {
      if (feat.layer && feat.layer.getBounds) bounds.extend(feat.layer.getBounds());
    });
    if (bounds.isValid()) {
      map.fitBounds(bounds.pad(0.15));
      map.once('moveend', doExport);
      setTimeout(doExport, 1000);
      showToast(`正在生成线稿 PNG (${count} 个区域)...`, 'info');
    } else { doExport(); }
  } else {
    showToast('正在生成线稿 PNG...', 'info');
    doExport();
  }
}

function doExportLineartPNG(selectedCount) {
  const svgElement = document.querySelector('#map svg');
  if (!svgElement) return showToast('未找到 SVG 元素', 'error');

  // 关键修复：保留 Leaflet 原始 viewBox
  // Leaflet 路径坐标基于地图像素原点（大数字如 25000 12000），viewBox 含偏移量
  // 原代码覆盖为 0 0 W H → 所有路径在可视区域外 → PNG 空白
  const originalViewBox = svgElement.getAttribute('viewBox');
  if (!originalViewBox) return showToast('无法获取地图 viewBox', 'error');
  const vbParts = originalViewBox.split(/\s+/).map(parseFloat);
  const vbX = vbParts[0], vbY = vbParts[1], vbW = vbParts[2], vbH = vbParts[3];

  const clone = svgElement.cloneNode(true);
  clone.setAttribute('xmlns', 'http://www.w3.org/2000/svg');
  clone.setAttribute('xmlns:xlink', 'http://www.w3.org/1999/xlink');

  // 保留原始 viewBox，不覆盖
  clone.setAttribute('width', vbW);
  clone.setAttribute('height', vbH);

  // 移除 Leaflet 的 CSS 样式（含 transform 等，独立渲染时无效）
  clone.removeAttribute('style');
  clone.removeAttribute('class');

  // 白色背景矩形（用显式坐标覆盖整个 viewBox 区域）
  const bgRect = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
  bgRect.setAttribute('x', vbX);
  bgRect.setAttribute('y', vbY);
  bgRect.setAttribute('width', vbW);
  bgRect.setAttribute('height', vbH);
  bgRect.setAttribute('fill', '#ffffff');
  clone.insertBefore(bgRect, clone.firstChild);

  // 强制轮廓模式：白底黑线
  // 移除内联 style 和 class（CSS 优先级高于 XML 属性，会覆盖 fill/stroke 设置）
  const paths = clone.querySelectorAll('path');
  paths.forEach(p => {
    p.removeAttribute('style');
    p.removeAttribute('class');
    p.setAttribute('fill', '#ffffff');
    p.setAttribute('fill-opacity', '1');
    p.setAttribute('stroke', '#000000');
    p.setAttribute('stroke-width', '1.5');
    p.removeAttribute('stroke-dasharray');
  });

  // 添加地名标注（仅 PNG，SVG 不加）
  const labelFeatures = [];
  layers.forEach(l => l.features.forEach(f => { if (f.selected) labelFeatures.push(f); }));
  const featuresToLabel = labelFeatures.length > 0 ? labelFeatures : layers.flatMap(l => l.features);

  featuresToLabel.forEach(feat => {
    if (!feat.layer || !feat.layer.getBounds) return;
    const bounds = feat.layer.getBounds();
    if (!bounds.isValid()) return;
    const center = bounds.getCenter();
    const point = map.latLngToLayerPoint(center);

    // 简化地名：四川省→四川, 成都市→成都, 自贡市→自贡
    let shortName = feat.name
      .replace(/(省|市|自治区|自治州|地区|盟|县|区)$/, '')
      .replace(/(壮族|回族|维吾尔|藏族|彝族|苗族|侗族|瑶族|白族|哈尼族|傣族|傈僳族|佤族|畲族|拉祜族|水族|东乡族|纳西族|景颇族|柯尔克孜族|土族|撒拉族|达斡尔族|仫佬族|羌族|布朗族|毛南族|仡佬族|锡伯族|阿昌族|普米族|塔吉克族|怒族|乌孜别克族|俄罗斯族|鄂温克族|德昂族|保安族|裕固族|京族|塔塔尔族|独龙族|鄂伦春族|赫哲族|门巴族|珞巴族|基诺族)/g, '');

    const text = document.createElementNS('http://www.w3.org/2000/svg', 'text');
    text.setAttribute('x', point.x);
    text.setAttribute('y', point.y);
    text.setAttribute('text-anchor', 'middle');
    text.setAttribute('dominant-baseline', 'middle');
    text.setAttribute('font-size', '14');
    text.setAttribute('font-family', 'Noto Sans SC, sans-serif');
    text.setAttribute('fill', '#000000');
    text.setAttribute('font-weight', '500');
    text.textContent = shortName;
    clone.appendChild(text);
  });

  const svgData = new XMLSerializer().serializeToString(clone);
  const svgBlob = new Blob([svgData], { type: 'image/svg+xml;charset=utf-8' });
  const svgUrl = URL.createObjectURL(svgBlob);

  const img = new Image();
  img.onload = () => {
    const scale = parseInt(document.getElementById('pngScale').value) || 2;
    const canvas = document.createElement('canvas');
    canvas.width = vbW * scale;
    canvas.height = vbH * scale;
    const ctx = canvas.getContext('2d');
    ctx.fillStyle = '#ffffff';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.drawImage(img, 0, 0, canvas.width, canvas.height);

    canvas.toBlob(blob => {
      if (!blob) {
        URL.revokeObjectURL(svgUrl);
        return showToast('PNG 生成失败（画布可能被污染）', 'error');
      }
      const url = URL.createObjectURL(blob);
      const fileName = `lineart_${selectedCount > 0 ? selectedCount + 'regions_' : ''}${Date.now()}.png`;
      const infoText = `${selectedCount > 0 ? selectedCount + ' 个区域' : '全部'} · 线稿 PNG · ${canvas.width}×${canvas.height}px`;

      const doDownload = () => {
        const a = document.createElement('a');
        a.href = url;
        a.download = fileName;
        a.click();
        URL.revokeObjectURL(url);
        URL.revokeObjectURL(svgUrl);
        showToast(selectedCount > 0 ? `线稿 PNG 已导出 (${selectedCount} 个区域)` : '线稿 PNG 已导出', 'success');
      };

      if (skipPreview) {
        doDownload();
      } else {
        showPreview(url, 'PNG', fileName, infoText, doDownload);
      }
    }, 'image/png');
  };
  img.onerror = () => {
    URL.revokeObjectURL(svgUrl);
    showToast('PNG 生成失败', 'error');
  };
  img.src = svgUrl;
}

// ============ 批量导出 ============
function exportBatch() {
  if (layers.length === 0) return showToast('没有可导出的地图', 'error');

  showToast('正在批量导出 SVG + PNG...', 'info');
  skipPreview = true;

  exportSVG();

  setTimeout(() => {
    exportLineartPNG();
    setTimeout(() => { skipPreview = false; }, 3000);
  }, 2000);
}

// ============ Toast ============
// ============ 导出预览 ============
let pendingDownload = null;
let pendingUrl = null;

function showPreview(url, type, fileName, infoText, downloadCallback) {
  // 如果有上一个待清理的预览 URL，先释放
  if (pendingUrl && pendingUrl !== url) {
    URL.revokeObjectURL(pendingUrl);
  }
  pendingUrl = url;
  pendingDownload = downloadCallback;

  document.getElementById('previewBadge').textContent = type;
  document.getElementById('previewInfo').textContent = `${infoText} · ${fileName}`;
  document.getElementById('previewImg').src = url;
  document.getElementById('previewOverlay').classList.add('open');
}

function closePreview() {
  document.getElementById('previewOverlay').classList.remove('open');
  document.getElementById('previewImg').src = '';
  pendingDownload = null;
  // 延迟释放 URL，避免 img 还在引用
  setTimeout(() => {
    if (pendingUrl) {
      URL.revokeObjectURL(pendingUrl);
      pendingUrl = null;
    }
  }, 200);
}

function confirmDownload() {
  if (pendingDownload) {
    const cb = pendingDownload;
    pendingDownload = null;
    document.getElementById('previewOverlay').classList.remove('open');
    document.getElementById('previewImg').src = '';
    cb();
    // URL 由回调内部释放，这里不清空 pendingUrl
    pendingUrl = null;
  }
}

// 按 ESC 关闭预览
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape' && document.getElementById('previewOverlay').classList.contains('open')) {
    closePreview();
  }
});

function showToast(msg, type = 'info') {
  const container = document.getElementById('toastContainer');
  const toast = document.createElement('div');
  toast.className = 'toast ' + type;
  toast.textContent = msg;
  container.appendChild(toast);
  setTimeout(() => {
    toast.style.opacity = '0';
    toast.style.transition = 'opacity 0.3s';
    setTimeout(() => toast.remove(), 300);
  }, 2600);
}

// ============ 事件 ============
// ============ 侧栏收起/展开 ============
function toggleSidebar(side) {
  const layout = document.getElementById('mainLayout');
  const cls = side === 'left' ? 'collapsed-left' : 'collapsed-right';
  layout.classList.toggle(cls);

  const isCollapsed = layout.classList.contains(cls);
  const btn = document.querySelector('.sidebar-toggle.' + side + '-btn');

  if (side === 'left') {
    btn.textContent = isCollapsed ? '›' : '‹';
    btn.title = isCollapsed ? '展开左侧' : '收起左侧';
  } else {
    btn.textContent = isCollapsed ? '‹' : '›';
    btn.title = isCollapsed ? '展开右侧' : '收起右侧';
  }

  // 地图重新计算尺寸
  setTimeout(() => map.invalidateSize(), 280);
}

window.addEventListener('resize', () => map.invalidateSize());

// 点击地图空白处取消 Leaflet 的 tooltip
map.on('click', () => {});
