<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<title>极简阅读器</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#F4F1EA">

<!-- 修复 FOUC (白屏闪烁) -->
<script>
  (function() {
    try {
      const settings = JSON.parse(localStorage.getItem('reader_settings_v13') || '{"theme":"default"}');
      const theme = settings.theme || 'default';
      document.documentElement.setAttribute('data-theme', theme);
    } catch(e) {}
  })();
</script>

<style>
:root { --sat: env(safe-area-inset-top); --sab: env(safe-area-inset-bottom); --header-h: 56px; --content-max-w: 720px; --bg: #F4F1EA; --text: #2D2D2D; --text-secondary: #888888; --card: rgba(255,255,255,0.5); --border: rgba(0,0,0,0.04); --accent: #9C8163; --header-bg: rgba(244, 241, 234, 0.85); --scrollbar-thumb: rgba(0,0,0,0.15); --scrollbar-thumb-hover: rgba(0,0,0,0.3); }
[data-theme="white"] { --bg: #FFFFFF; --text: #1A1A1A; --card: rgba(0,0,0,0.02); --border: rgba(0,0,0,0.06); --accent: #0055A4; --header-bg: rgba(255, 255, 255, 0.85); --scrollbar-thumb: rgba(0,0,0,0.15); --scrollbar-thumb-hover: rgba(0,0,0,0.3); }
[data-theme="green"] { --bg: #cce8cf; --text: #2f3e2f; --text-secondary: #5c705c; --card: rgba(255,255,255,0.4); --border: rgba(0,0,0,0.05); --accent: #4a7c59; --header-bg: rgba(204, 232, 207, 0.85); --scrollbar-thumb: rgba(0,0,0,0.15); --scrollbar-thumb-hover: rgba(0,0,0,0.3); }
[data-theme="sepia"] { --bg: #f4ecd8; --text: #4a4035; --text-secondary: #8a7d6b; --card: rgba(255,255,255,0.4); --border: rgba(0,0,0,0.05); --accent: #8d6e63; --header-bg: rgba(244, 236, 216, 0.85); --scrollbar-thumb: rgba(0,0,0,0.15); --scrollbar-thumb-hover: rgba(0,0,0,0.3); }
[data-theme="dark"] { --bg: #161618; --text: #D4D4D8; --text-secondary: #71717A; --card: rgba(255,255,255,0.04); --border: rgba(255,255,255,0.08); --accent: #D4AF37; --header-bg: rgba(22, 22, 24, 0.85); --scrollbar-thumb: rgba(255,255,255,0.15); --scrollbar-thumb-hover: rgba(255,255,255,0.3); }

* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; overflow: hidden; background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "HarmonyOS Sans SC", "Microsoft YaHei", sans-serif; transition: background .4s, color .4s; }
.page::-webkit-scrollbar, #drawer-toc .list::-webkit-scrollbar { width: 6px; }
.page::-webkit-scrollbar-track, #drawer-toc .list::-webkit-scrollbar-track { background: transparent; }
.page::-webkit-scrollbar-thumb, #drawer-toc .list::-webkit-scrollbar-thumb { background: var(--scrollbar-thumb); border-radius: 3px; transition: background .2s; }
.page::-webkit-scrollbar-thumb:hover, #drawer-toc .list::-webkit-scrollbar-thumb:hover { background: var(--scrollbar-thumb-hover); }
.page { position: absolute; inset: 0; overflow-y: auto; -webkit-overflow-scrolling: touch; transition: opacity .3s, visibility .3s; }
.page.hidden { opacity: 0; visibility: hidden; pointer-events: none; }

#header { position: fixed; top: 0; left: 0; right: 0; z-index: 100; height: var(--header-h); display: flex; align-items: center; justify-content: center; background: var(--header-bg); backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px); border-bottom: 1px solid var(--border); transform: translateY(-100%); transition: transform .35s cubic-bezier(.4,0,.2,1); }
body.ui-visible #header { transform: translateY(0); }
.header-inner { width: 100%; max-width: var(--content-max-w); padding: 0 20px; display: flex; align-items: center; justify-content: space-between; }
#header .title { font-size: 15px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex: 1; text-align: center; margin: 0 10px; letter-spacing: 0.5px; }
.icon-btn { background: none; border: none; color: var(--text); font-size: 20px; padding: 8px; cursor: pointer; border-radius: 50%; transition: background .2s; display: flex; align-items: center; justify-content: center; }
.icon-btn:hover { background: var(--border); }
.header-actions { display: flex; gap: 4px; }

#content-wrapper { max-width: var(--content-max-w); margin: 0 auto; padding: calc(var(--header-h) + 40px) 24px 100px; font-size: 18px; line-height: 1.9; min-height: 100%; letter-spacing: 0.5px; }
#content-wrapper p { text-indent: 2em; margin-bottom: 1.2em; text-align: left; }
#content-wrapper .chapter-title { font-size: 22px; font-weight: 600; text-align: center; margin: 2.5em 0 0.8em; padding-bottom: 12px; color: var(--accent); scroll-margin-top: calc(var(--header-h) + 30px); position: relative; }
#content-wrapper .chapter-title::after { content: ''; position: absolute; bottom: 0; left: 50%; transform: translateX(-50%); width: 240px; height: 2px; background: radial-gradient(ellipse at center, var(--accent) 0%, transparent 60%); opacity: 0.5; }

.overlay { position: fixed; inset: 0; background: rgba(0,0,0,.3); z-index: 200; opacity: 0; visibility: hidden; transition: all .3s; backdrop-filter: blur(4px); }
.overlay.active { opacity: 1; visibility: visible; }
#drawer-toc { position: fixed; top: 0; left: 0; bottom: 0; width: 85%; max-width: 340px; z-index: 210; background: var(--bg); transform: translateX(-100%); transition: transform .35s cubic-bezier(.4,0,.2,1); display: flex; flex-direction: column; box-shadow: 4px 0 24px rgba(0,0,0,0.05); }
#drawer-toc.active { transform: translateX(0); }
#drawer-toc .header { padding: 24px; border-bottom: 1px solid var(--border); font-size: 18px; font-weight: 600; padding-top: calc(24px + var(--sat)); letter-spacing: 1px; }
#drawer-toc .list { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; padding: 12px; }
#drawer-toc .item { padding: 14px 16px; border-radius: 8px; font-size: 15px; color: var(--text-secondary); cursor: pointer; white-space: normal; line-height: 1.5; margin-bottom: 4px; transition: all .2s; }
#drawer-toc .item:hover { background: var(--card); color: var(--text); }
#drawer-toc .item.active { background: var(--accent); color: #fff; font-weight: 500; box-shadow: 0 4px 12px rgba(156, 129, 99, 0.2); }
#drawer-settings { position: fixed; left: 0; right: 0; bottom: 0; z-index: 210; background: var(--bg); border-radius: 20px 20px 0 0; transform: translateY(100%); transition: transform .35s cubic-bezier(.4,0,.2,1); padding: 24px; padding-bottom: calc(24px + var(--sab)); max-width: 500px; margin: 0 auto; box-shadow: 0 -4px 24px rgba(0,0,0,0.05); }
#drawer-settings.active { transform: translateY(0); }
.setting-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 28px; }
.setting-label { font-size: 14px; color: var(--text-secondary); font-weight: 500; }
.setting-btns { display: flex; gap: 12px; align-items: center; }
.setting-btns button { padding: 8px 16px; border-radius: 20px; border: 1px solid var(--border); background: var(--card); color: var(--text); font-size: 14px; cursor: pointer; transition: all .2s; }
.setting-btns button:hover { border-color: var(--accent); }
.setting-btns button.active { background: var(--accent); color: #fff; border-color: var(--accent); }
.theme-dots { display: flex; gap: 16px; }
.theme-dot { width: 32px; height: 32px; border-radius: 50%; border: 2px solid transparent; cursor: pointer; position: relative; transition: transform .2s; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
.theme-dot:hover { transform: scale(1.1); }
.theme-dot.active { border-color: var(--accent); transform: scale(1.15); }
.theme-dot[data-t="white"] { background: #fff; border: 1px solid #eee; }
.theme-dot[data-t="green"] { background: #cce8cf; }
.theme-dot[data-t="default"] { background: #F4F1EA; }
.theme-dot[data-t="sepia"] { background: #f4ecd8; }
.theme-dot[data-t="dark"] { background: #161618; border: 1px solid #333; }

/* ================= 书架样式 ================= */
#bookshelf { padding: 24px; padding-top: calc(24px + var(--sat)); max-width: 800px; margin: 0 auto; }
.shelf-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 32px; gap: 12px; }
.shelf-header h1 { font-size: 28px; font-weight: 700; letter-spacing: -0.5px; flex-shrink: 0; }
.header-btns { display: flex; gap: 10px; }
.btn-secondary { padding: 8px 16px; border-radius: 20px; background: var(--card); color: var(--text-secondary); border: 1px solid var(--border); font-size: 14px; font-weight: 500; cursor: pointer; transition: all .2s; }
.btn-secondary:hover { border-color: var(--accent); color: var(--text); }
.btn-import { padding: 8px 18px; border-radius: 20px; background: var(--accent); color: #fff; border: none; font-size: 14px; font-weight: 500; cursor: pointer; transition: all .2s; box-shadow: 0 4px 12px rgba(156, 129, 99, 0.15); }
.btn-import:hover { opacity: 0.9; transform: translateY(-1px); }
.btn-import:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
.book-list { display: flex; flex-direction: column; gap: 16px; }
.book-item { padding: 20px; background: var(--card); border-radius: 16px; border: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; transition: all .25s; gap: 16px; }
.book-item:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(0,0,0,0.04); }
.book-main { flex: 1; min-width: 0; display: flex; flex-direction: column; gap: 8px; }
.book-name { font-size: 17px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.progress-info { display: flex; flex-direction: column; gap: 6px; }
.progress-text { font-size: 12px; color: var(--text-secondary); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.progress-bar { width: 100%; height: 4px; background: var(--border); border-radius: 2px; overflow: hidden; }
.progress-fill { height: 100%; background: linear-gradient(270deg, var(--accent), transparent); border-radius: 2px; transition: width .3s; }
.book-actions { display: flex; gap: 10px; align-items: center; flex-shrink: 0; }
.btn-read { padding: 8px 16px; border-radius: 8px; border: none; font-size: 13px; font-weight: 500; cursor: pointer; background: var(--accent); color: #fff; transition: all .2s; }
.btn-read:hover { opacity: 0.9; }
.btn-icon-action { width: 36px; height: 36px; border-radius: 50%; border: 1px solid var(--border); background: transparent; color: var(--text-secondary); display: flex; align-items: center; justify-content: center; cursor: pointer; transition: all .2s; }
.btn-icon-action:hover { background: var(--border); color: var(--text); }
.btn-icon-action.btn-delete { color: #ff4d4f; border-color: rgba(255, 77, 79, 0.2); }
.btn-icon-action.btn-delete:hover { background: rgba(255, 77, 79, 0.1); border-color: #ff4d4f; }
.empty-tip { text-align: center; padding: 80px 20px; color: var(--text-secondary); font-size: 15px; line-height: 1.6; }
#loading-mask { position: fixed; inset: 0; z-index: 999; background: var(--bg); display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 16px; color: var(--text-secondary); transition: opacity .3s; gap: 12px; }
#loading-mask.hidden { opacity: 0; pointer-events: none; }
.loading-spinner { width: 24px; height: 24px; border: 3px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 1s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

@media (max-width: 600px) { 
  #content-wrapper { font-size: 16px; padding-left: 20px; padding-right: 20px; line-height: 1.8; } 
  #content-wrapper .chapter-title { font-size: 20px; } 
  .shelf-header h1 { font-size: 24px; } 
  .book-item { padding: 16px; flex-wrap: wrap; }
  .book-actions { width: 100%; justify-content: flex-end; margin-top: 4px; }
  .btn-icon-action { width: 32px; height: 32px; }
}
</style>
</head>
<body>

<div id="loading-mask" class="hidden"><div class="loading-spinner"></div><div id="loading-text">正在解析书籍...</div></div>
<div id="bookshelf" class="page">
  <div class="shelf-header">
    <h1>书架</h1>
    <div class="header-btns">
      <button id="clear-cache-btn" class="btn-secondary">清理缓存</button>
      <button id="import-btn" class="btn-import">+ 导入</button>
    </div>
  </div>
  <input type="file" id="file-input" accept=".txt,.TXT,text/plain" hidden>
  <div class="book-list" id="book-list"></div>
</div>

<div id="reader" class="page hidden">
  <header id="header">
    <div class="header-inner">
      <button class="icon-btn" id="btn-back" title="返回"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"></polyline></svg></button>
      <div class="title" id="header-title">准备中...</div>
      <div class="header-actions">
        <button class="icon-btn" id="btn-night-mode" title="夜间模式"></button>
        <button class="icon-btn" id="btn-settings" title="设置" style="font-size: 15px; font-weight: 600; font-family: serif;">Aa</button>
        <button class="icon-btn" id="btn-toc" title="目录"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg></button>
      </div>
    </div>
  </header>
  <main id="content-wrapper"></main>
</div>

<div class="overlay" id="overlay"></div>
<aside id="drawer-toc"><div class="header">目录</div><div class="list" id="toc-list"></div></aside>
<div id="drawer-settings">
  <div class="setting-row"><span class="setting-label">字号</span><div class="setting-btns"><button id="font-dec">A-</button><span id="font-val" style="min-width: 30px; text-align: center; font-weight: 600;">18</span><button id="font-inc">A+</button></div></div>
  <div class="setting-row"><span class="setting-label">行距</span><div class="setting-btns"><button data-line="1.6">紧凑</button><button data-line="1.9" class="active">适中</button><button data-line="2.2">宽松</button></div></div>
  <div class="setting-row"><span class="setting-label">主题</span><div class="theme-dots"><div class="theme-dot" data-t="white" title="极简白"></div><div class="theme-dot" data-t="green" title="护眼绿"></div><div class="theme-dot" data-t="default" title="暖灰纸"></div><div class="theme-dot" data-t="sepia" title="羊皮纸"></div><div class="theme-dot" data-t="dark" title="深邃夜"></div></div></div>
</div>

<script>
// ================= 1. 云端 API =================
const API = {
    async listBooks() { return (await fetch('/api/books')).json(); },
    async getBookMeta(id) { return (await fetch(`/api/books/${encodeURIComponent(id)}`)).json(); },
    async getBookContent(id) { return (await fetch(`/api/books/${encodeURIComponent(id)}/content`)).text(); },
    async createBook(d) { return (await fetch('/api/books', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(d) })).json(); },
    // 修改：增加 currentChapterTitle 参数
    async updateProgress(id, d) { return (await fetch(`/api/books/${encodeURIComponent(id)}/progress`, { method:'PUT', headers:{'Content-Type':'application/json'}, body:JSON.stringify(d), keepalive: true })).json(); },
    async deleteBook(id) { return (await fetch(`/api/books/${encodeURIComponent(id)}`, { method:'DELETE' })).json(); }
};

// ================= 2. IndexedDB 缓存 =================
const LocalCache = {
    db: null,
    async init() {
        if (this.db) return;
        return new Promise((resolve, reject) => {
            const request = indexedDB.open('ReaderCache', 2);
            request.onupgradeneeded = (e) => {
                const db = e.target.result;
                if (!db.objectStoreNames.contains('books')) db.createObjectStore('books', { keyPath: 'id' });
            };
            request.onsuccess = (e) => { this.db = e.target.result; resolve(); };
            request.onerror = (e) => reject(e);
        });
    },
    async get(id) {
        if(!this.db) await this.init();
        return new Promise((resolve) => {
            const tx = this.db.transaction('books', 'readonly');
            const req = tx.objectStore('books').get(id);
            req.onsuccess = () => resolve(req.result); req.onerror = () => resolve(null);
        });
    },
    async set(id, data) {
        if(!this.db) await this.init();
        return new Promise((resolve) => {
            const tx = this.db.transaction('books', 'readwrite');
            tx.objectStore('books').put({ id, ...data, timestamp: Date.now() });
            tx.oncomplete = () => resolve();
        });
    },
    async updateProgress(id, progressGidx, scrollTop) {
        const data = await this.get(id);
        if (data) { data.lastProgressGidx = progressGidx; data.lastScrollTop = scrollTop; await this.set(id, data); }
    },
    async delete(id) {
        if(!this.db) await this.init();
        return new Promise((resolve) => {
            const tx = this.db.transaction('books', 'readwrite');
            tx.objectStore('books').delete(id); tx.oncomplete = () => resolve();
        });
    },
    async clearAll() {
        if(!this.db) await this.init();
        return new Promise((resolve) => {
            const tx = this.db.transaction('books', 'readwrite');
            tx.objectStore('books').clear(); tx.oncomplete = () => resolve();
        });
    }
};

// ================= 3. 数据管理层 =================
const DataManager = {
    bookId: null, chMap: [], totalParagraphs: 0, _localParagraphs: [],
    async init(bookId, forceRefresh = false) {
        this.bookId = bookId;
        if (!forceRefresh) {
            const cached = await LocalCache.get(bookId);
            if (cached && cached.paragraphs && cached.paragraphs.length > 0) {
                this._localParagraphs = cached.paragraphs; this.chMap = cached.chMap; this.totalParagraphs = cached.paragraphs.length;
                try { return await API.getBookMeta(bookId); } 
                catch (e) { return { name: cached.name, progress_gidx: cached.lastProgressGidx || 0, scroll_top: cached.lastScrollTop || 0 }; }
            }
        }
        const [meta, text] = await Promise.all([API.getBookMeta(bookId), API.getBookContent(bookId)]);
        const parsed = await parseTextAsync(text, meta.name);
        this._localParagraphs = parsed.paragraphs; this.chMap = parsed.chMap; this.totalParagraphs = parsed.paragraphs.length;
        await LocalCache.set(bookId, { paragraphs: parsed.paragraphs, chMap: parsed.chMap, name: meta.name, lastProgressGidx: meta.progress_gidx || 0, lastScrollTop: meta.scroll_top || 0 });
        return meta;
    },
    getChapterByGlobalIdx(gIdx) {
        let l = 0, r = this.chMap.length - 1;
        while (l <= r) { let mid = (l + r) >> 1; if (this.chMap[mid].globalIdx <= gIdx) l = mid + 1; else r = mid - 1; }
        return this.chMap[r] || this.chMap[0];
    },
    destroy() { this._localParagraphs = []; this.chMap = []; this.totalParagraphs = 0; }
};

// ================= 4. Web Worker =================
function parseTextAsync(text, fileName) {
    return new Promise((resolve, reject) => {
        const workerScript = `
            const CHAPTER_REGEX = /^\\s*(第[零一二三四五六七八九十百千万0-9]+[章节回部集卷][^。\\n]{0,15}?)\\s*$/i;
            self.onmessage = function(e) {
                const { text, fileName } = e.data;
                try {
                    const lines = text.split(/\\r?\\n/);
                    const paragraphs = []; const chMap = []; let currentChapterIdx = -1;
                    for (let i = 0; i < lines.length; i++) {
                        const trimmed = lines[i].trim(); if (!trimmed) continue;
                        const match = trimmed.match(CHAPTER_REGEX);
                        if (match) {
                            currentChapterIdx++; const gIdx = paragraphs.length;
                            chMap.push({ chapterIdx: currentChapterIdx, globalIdx: gIdx, title: match[1].trim() });
                            paragraphs.push({ type: 'h2', text: match[1].trim(), chapterIdx: currentChapterIdx, globalIdx: gIdx });
                        } else {
                            if (currentChapterIdx === -1) { currentChapterIdx = 0; chMap.push({ chapterIdx: 0, globalIdx: 0, title: '前言' }); paragraphs.push({ type: 'h2', text: '前言', chapterIdx: 0, globalIdx: 0 }); }
                            const gIdx = paragraphs.length;
                            paragraphs.push({ type: 'p', text: trimmed, chapterIdx: currentChapterIdx, globalIdx: gIdx });
                        }
                    }
                    self.postMessage({ success: true, paragraphs, chMap, bookName: fileName.replace(/\\.(txt|TXT)$/i, '') });
                } catch (err) { self.postMessage({ success: false, error: err.message }); }
            };`;
        const blob = new Blob([workerScript], { type: 'application/javascript' });
        const worker = new Worker(URL.createObjectURL(blob));
        worker.onmessage = (e) => { worker.terminate(); if(e.data.success) resolve(e.data); else reject(new Error(e.data.error)); };
        worker.onerror = (e) => { worker.terminate(); reject(e); };
        worker.postMessage({ text, fileName });
    });
}

// ================= 5. 渲染引擎 =================
const contentWrapper = document.getElementById('content-wrapper');
const readerEl = document.getElementById('reader');
const BUFFER_SIZE = 40; 
let windowStart = 0, windowEnd = 0;
let currentGlobalIdx = 0, currentChapterIdx = 0, currentBookId = null;
let obsTop, obsBot;

function createNode(para, gIdx) {
    const el = document.createElement(para.type === 'h2' ? 'h2' : 'p');
    el.className = para.type === 'h2' ? 'chapter-title' : '';
    el.textContent = para.text; el.dataset.gidx = gIdx; el.dataset.cidx = para.chapterIdx;
    return el;
}

function setupVirtualScroll() {
    if (obsTop) obsTop.disconnect(); if (obsBot) obsBot.disconnect();
    let sTop = document.getElementById('sentinel-top'); let sBot = document.getElementById('sentinel-bottom');
    if (!sTop) { sTop = document.createElement('div'); sTop.id = 'sentinel-top'; sTop.style.height = '1px'; contentWrapper.prepend(sTop); }
    if (!sBot) { sBot = document.createElement('div'); sBot.id = 'sentinel-bottom'; sBot.style.height = '1px'; contentWrapper.appendChild(sBot); }
    
    obsBot = new IntersectionObserver((entries) => { if (entries[0].isIntersecting && windowEnd < DataManager.totalParagraphs - 1) loadMore('bottom'); }, { root: readerEl, rootMargin: '150%' });
    obsBot.observe(sBot);
    obsTop = new IntersectionObserver((entries) => { if (entries[0].isIntersecting && windowStart > 0) loadMore('top'); }, { root: readerEl, rootMargin: '150%' });
    obsTop.observe(sTop);
}

function loadMore(direction) {
    if (direction === 'bottom') {
        const newEnd = Math.min(DataManager.totalParagraphs - 1, windowEnd + BUFFER_SIZE);
        if (newEnd === windowEnd) return;
        const f = document.createDocumentFragment();
        DataManager._localParagraphs.slice(windowEnd + 1, newEnd + 1).forEach((p, i) => f.appendChild(createNode(p, windowEnd + 1 + i)));
        contentWrapper.insertBefore(f, document.getElementById('sentinel-bottom')); windowEnd = newEnd;
    } else if (direction === 'top') {
        const newStart = Math.max(0, windowStart - BUFFER_SIZE);
        if (newStart === windowStart) return;
        const f = document.createDocumentFragment();
        DataManager._localParagraphs.slice(newStart, windowStart).forEach((p, i) => f.appendChild(createNode(p, newStart + i)));
        
        const sTop = document.getElementById('sentinel-top');
        const oldScrollHeight = contentWrapper.scrollHeight;
        contentWrapper.insertBefore(f, sTop.nextSibling); 
        windowStart = newStart;
        readerEl.scrollTop += (contentWrapper.scrollHeight - oldScrollHeight);
    }
    cleanUpDOM();
}

function cleanUpDOM() {
    let sTop = document.getElementById('sentinel-top');
    let node = sTop ? sTop.nextSibling : contentWrapper.firstChild;
    while (node && node.id !== 'sentinel-bottom') {
        if (parseInt(node.dataset.gidx) < windowStart) {
            let next = node.nextSibling;
            contentWrapper.removeChild(node);
            node = next;
        } else {
            break;
        }
    }
    
    let sBot = document.getElementById('sentinel-bottom');
    node = sBot ? sBot.previousSibling : contentWrapper.lastChild;
    while (node && node.id !== 'sentinel-top') {
        if (parseInt(node.dataset.gidx) > windowEnd) {
            let prev = node.previousSibling;
            contentWrapper.removeChild(node);
            node = prev;
        } else {
            break;
        }
    }
}

function teleportTo(centerIdx) {
    const newStart = Math.max(0, centerIdx - BUFFER_SIZE); const newEnd = Math.min(DataManager.totalParagraphs - 1, centerIdx + BUFFER_SIZE);
    contentWrapper.innerHTML = '';
    const sTop = document.createElement('div'); sTop.id = 'sentinel-top'; sTop.style.height = '1px'; contentWrapper.appendChild(sTop);
    const f = document.createDocumentFragment();
    DataManager._localParagraphs.slice(newStart, newEnd + 1).forEach((p, i) => f.appendChild(createNode(p, newStart + i)));
    contentWrapper.appendChild(f);
    const sBot = document.createElement('div'); sBot.id = 'sentinel-bottom'; sBot.style.height = '1px'; contentWrapper.appendChild(sBot);
    windowStart = newStart; windowEnd = newEnd; setupVirtualScroll();
}

// ================= 6. 滚动监听 =================
let scrollTimer;
readerEl.addEventListener('scroll', () => {
    clearTimeout(scrollTimer);
    scrollTimer = setTimeout(() => {
        const scrollTop = readerEl.scrollTop; const domNodes = contentWrapper.children; let topGidx = windowStart;
        for (let i = 0; i < domNodes.length; i++) { if (domNodes[i].offsetTop <= scrollTop + 100) topGidx = parseInt(domNodes[i].dataset.gidx); else break; }
        const currentChapter = DataManager.getChapterByGlobalIdx(topGidx);
        if (currentChapter.chapterIdx !== currentChapterIdx) { currentChapterIdx = currentChapter.chapterIdx; updateHeader(currentChapterIdx); }
        currentGlobalIdx = topGidx;
        saveProgress();
    }, 60);
}, { passive: true });

function updateHeader(cIdx) {
    const ch = DataManager.chMap.find(c => c.chapterIdx === cIdx);
    document.getElementById('header-title').textContent = ch ? ch.title : '阅读中';
    document.querySelectorAll('#toc-list .item').forEach((el, i) => el.classList.toggle('active', i === cIdx));
}

async function jumpToChapter(cIdx) {
    const ch = DataManager.chMap.find(c => c.chapterIdx === cIdx); 
    if (!ch) return;
    
    closeDrawers(); 
    document.body.classList.remove('ui-visible');
    
    teleportTo(ch.globalIdx);
    
    setTimeout(() => {
        const targetNode = contentWrapper.querySelector(`[data-gidx="${ch.globalIdx}"]`);
        if (targetNode) {
            void targetNode.offsetHeight; 
            targetNode.scrollIntoView({ behavior: 'smooth', block: 'start' });
        }
    }, 50);
}

// ================= 7. 交互与设置 =================
let touchStartX = 0, touchStartY = 0, isSwiping = false, lastTouchTime = 0;
contentWrapper.addEventListener('touchstart', e => { touchStartX = e.touches[0].clientX; touchStartY = e.touches[0].clientY; isSwiping = false; }, { passive: true });
contentWrapper.addEventListener('touchmove', e => { if (Math.abs(e.touches[0].clientX - touchStartX) > 15 || Math.abs(e.touches[0].clientY - touchStartY) > 15) isSwiping = true; }, { passive: true });
contentWrapper.addEventListener('touchend', e => { lastTouchTime = Date.now(); if (isSwiping || window.getSelection().toString().length > 0) return; toggleUI(); });

// 修改：移除了左右点击翻页逻辑，仅保留中间点击切换 UI
contentWrapper.addEventListener('click', e => {
    if (Date.now() - lastTouchTime < 500 || isSwiping || window.getSelection().toString().length > 0) return;
    if (e.target.closest('button, a, input, #drawer-settings')) return;
    // 移除: if (clickX < width * 0.3) ...
    // 移除: else if (clickX > width * 0.7) ...
    // 保留: 点击中间区域切换 UI
    toggleUI();
});

document.addEventListener('keydown', e => {
    if (document.getElementById('reader').classList.contains('hidden')) return;
    if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
    switch(e.key) {
        case 'ArrowLeft': jumpToChapter(currentChapterIdx - 1); break;
        case 'ArrowRight': jumpToChapter(currentChapterIdx + 1); break;
        case 'ArrowUp': readerEl.scrollBy({ top: -readerEl.clientHeight * 0.8, behavior: 'smooth' }); break;
        case 'ArrowDown': readerEl.scrollBy({ top: readerEl.clientHeight * 0.8, behavior: 'smooth' }); break;
        case 'Escape': closeDrawers(); document.body.classList.remove('ui-visible'); break;
    }
});

function toggleUI() { document.body.classList.toggle('ui-visible'); }
function openDrawer(id) {
    document.getElementById('overlay').classList.add('active'); document.getElementById(id).classList.add('active');
    if (id === 'drawer-toc') setTimeout(() => { const a = document.querySelector('#toc-list .item.active'); if (a) a.scrollIntoView({ behavior: 'smooth', block: 'center' }); }, 200);
}
function closeDrawers() { document.getElementById('overlay').classList.remove('active'); document.querySelectorAll('[id^="drawer-"]').forEach(el => el.classList.remove('active')); }
document.getElementById('overlay').onclick = closeDrawers;
document.getElementById('btn-back').onclick = () => { saveProgress(true); DataManager.destroy(); document.getElementById('reader').classList.add('hidden'); document.getElementById('bookshelf').classList.remove('hidden'); renderBookList(); };
document.getElementById('btn-toc').onclick = () => openDrawer('drawer-toc');
document.getElementById('btn-settings').onclick = () => openDrawer('drawer-settings');

function updateNightModeIcon() {
    const btn = document.getElementById('btn-night-mode');
    btn.innerHTML = settings.theme === 'dark' 
        ? '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>'
        : '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>';
}

let settings = JSON.parse(localStorage.getItem('reader_settings_v13') || '{"fontSize":18,"lineHeight":1.9,"theme":"default","previousTheme":"default"}');
function applySettings() {
    document.body.dataset.theme = settings.theme;
    contentWrapper.style.fontSize = settings.fontSize + 'px'; contentWrapper.style.lineHeight = settings.lineHeight;
    document.getElementById('font-val').textContent = settings.fontSize;
    document.querySelectorAll('.theme-dot').forEach(el => el.classList.toggle('active', el.dataset.t === settings.theme));
    document.querySelectorAll('[data-line]').forEach(el => el.classList.toggle('active', parseFloat(el.dataset.line) === settings.lineHeight));
    updateNightModeIcon(); localStorage.setItem('reader_settings_v13', JSON.stringify(settings));
}

document.getElementById('btn-night-mode').onclick = () => {
    settings.theme = settings.theme === 'dark' ? (settings.previousTheme || 'default') : 'dark';
    if (settings.theme !== 'dark') settings.previousTheme = settings.theme; applySettings();
};
document.getElementById('font-dec').onclick = () => { if(settings.fontSize > 14) { settings.fontSize -= 2; applySettings(); } };
document.getElementById('font-inc').onclick = () => { if(settings.fontSize < 28) { settings.fontSize += 2; applySettings(); } };
document.querySelectorAll('[data-line]').forEach(btn => { btn.onclick = () => { settings.lineHeight = parseFloat(btn.dataset.line); applySettings(); }; });
document.querySelectorAll('.theme-dot').forEach(dot => { dot.onclick = () => { settings.theme = dot.dataset.t; applySettings(); }; });

// ================= 8. 进度保存 =================
let saveTimer;
function saveProgress(force = false) {
    clearTimeout(saveTimer);
    const doSave = () => {
        if (currentBookId) {
            // 修改：查找当前章节标题并传给后端
            const currentChapter = DataManager.chMap.find(c => c.chapterIdx === currentChapterIdx);
            const chapterTitle = currentChapter ? currentChapter.title : '';

            API.updateProgress(currentBookId, { 
                progressGidx: currentGlobalIdx, 
                scrollTop: readerEl.scrollTop,
                currentChapterTitle: chapterTitle 
            }).catch(()=>{});
            LocalCache.updateProgress(currentBookId, currentGlobalIdx, readerEl.scrollTop);
        }
    };
    if (force) doSave(); else saveTimer = setTimeout(doSave, 500);
}
document.addEventListener('visibilitychange', () => { if (document.hidden) saveProgress(true); });
window.addEventListener('beforeunload', () => { saveProgress(true); });

// ================= 9. 书架与导入 =================
// 修改：增加 XSS 防御，增加反引号和斜杠
function escapeHtml(text) {
    if (!text) return '';
    return text.replace(/[&<>"'\/`]/g, function(m) {
        return {'&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;', '/': '&#x2F;', '`': '&#x60;'}[m];
    });
}

const importBtn = document.getElementById('import-btn');
const loadingMask = document.getElementById('loading-mask');
const loadingText = document.getElementById('loading-text');

document.getElementById('clear-cache-btn').onclick = async () => {
    if(confirm('确定清理所有书籍的本地缓存吗？\n(下次打开书籍时将重新下载并解析)')) {
        await LocalCache.clearAll();
        alert('缓存已清理！');
    }
};

// 修改：书架渲染逻辑，使用后端返回的精简数据
async function renderBookList() {
    const books = await API.listBooks();
    const list = document.getElementById('book-list');
    if (!books || books.length === 0) { list.innerHTML = '<div class="empty-tip">书架空空如也<br>点击右上角导入你的第一本 TXT 小说</div>'; return; }
    
    list.innerHTML = books.map(b => {
        // 直接使用后端计算好的字段
        const currentTitle = b.current_chapter_title || '未开始';
        const totalP = b.total_paragraphs || 1; // 防止除零
        const readP = (b.progress_gidx || 0) + 1;
        const progressPercent = Math.min(100, Math.round((readP / totalP) * 100));

        return `
        <div class="book-item" data-id="${escapeHtml(b.id)}">
            <div class="book-main">
                <div class="book-name">${escapeHtml(b.name)}</div>
                <div class="progress-info">
                    <span class="progress-text">${escapeHtml(currentTitle)} (${progressPercent}%)</span>
                    <div class="progress-bar"><div class="progress-fill" style="width: ${progressPercent}%"></div></div>
                </div>
            </div>
            <div class="book-actions">
                <button class="btn-read" onclick="openBook('${escapeHtml(b.id)}')">阅读</button>
                <button class="btn-icon-action" onclick="refreshBook('${escapeHtml(b.id)}')" title="刷新缓存">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"></polyline><polyline points="1 20 1 14 7 14"></polyline><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"></path></svg>
                </button>
                <button class="btn-icon-action btn-delete" onclick="deleteBook('${escapeHtml(b.id)}')" title="删除">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>
                </button>
            </div>
        </div>`;
    }).join('');
}

window.refreshBook = async function(id) {
    loadingMask.classList.remove('hidden'); loadingText.textContent = '正在重新解析...';
    try {
        await LocalCache.delete(id);
        await DataManager.init(id, true); 
        renderBookList(); 
    } catch(e) { alert('刷新失败：' + e.message); } 
    finally { loadingMask.classList.add('hidden'); }
};

window.openBook = async function(id) {
    currentBookId = id;
    loadingMask.classList.remove('hidden'); loadingText.textContent = '正在加载书籍...';
    try {
        const meta = await DataManager.init(id);
        document.getElementById('bookshelf').classList.add('hidden');
        document.getElementById('reader').classList.remove('hidden');
        contentWrapper.innerHTML = ''; windowStart = 0; windowEnd = 0;
        renderTocList();
        
        currentGlobalIdx = Math.min(meta.progress_gidx || 0, DataManager.totalParagraphs - 1);
        currentChapterIdx = DataManager.getChapterByGlobalIdx(currentGlobalIdx).chapterIdx;
        
        teleportTo(currentGlobalIdx); updateHeader(currentChapterIdx); applySettings();
        setTimeout(() => { 
            if (meta.scroll_top > 0) readerEl.scrollTop = meta.scroll_top;
            else { const targetNode = contentWrapper.querySelector(`[data-gidx="${currentGlobalIdx}"]`); if (targetNode) targetNode.scrollIntoView({ block: 'start' }); }
        }, 150);
    } catch (e) { alert('加载失败：' + e.message); document.getElementById('bookshelf').classList.remove('hidden'); } 
    finally { loadingMask.classList.add('hidden'); }
};

window.deleteBook = async function(id) {
    if (confirm('确定删除这本书吗？')) { 
        await LocalCache.delete(id); await API.deleteBook(id); renderBookList(); 
    }
};

importBtn.onclick = () => document.getElementById('file-input').click();
document.getElementById('file-input').onchange = async (e) => {
    const file = e.target.files[0]; if (!file) return;
    importBtn.disabled = true; loadingText.textContent = '正在后台解析并上传...'; loadingMask.classList.remove('hidden');
    try {
        const text = await file.text();
        const parsed = await parseTextAsync(text, file.name);
        // 修改：不再自己生成 ID，totalParagraphs 也提交给后端
        const wordCount = parsed.paragraphs.reduce((s, p) => s + (p.type === 'p' ? p.text.length : 0), 0);
        
        const res = await API.createBook({
            // id: 删除，由后端生成
            name: file.name.replace(/\.(txt|TXT)$/i, ''), 
            content: text, 
            // r2_key: 删除，由后端生成
            chMap: JSON.stringify(parsed.chMap),
            wordCount: wordCount,
            totalChapters: parsed.chMap.length,
            totalParagraphs: parsed.paragraphs.length
        });
        
        // 使用后端返回的 ID
        if (res.success && res.id) {
            // 可以选择性地在这里也把这本新书加入 LocalCache (可选，目前逻辑是点击阅读时才加载)
            await renderBookList();
        }
    } catch (err) { alert('导入失败：' + err.message); } 
    finally { loadingMask.classList.add('hidden'); importBtn.disabled = false; e.target.value = ''; }
};

document.getElementById('toc-list').onclick = (e) => { const item = e.target.closest('.item'); if (item) jumpToChapter(parseInt(item.dataset.cidx)); };
function renderTocList() { document.getElementById('toc-list').innerHTML = DataManager.chMap.map(ch => `<div class="item" data-cidx="${ch.chapterIdx}">${escapeHtml(ch.title)}</div>`).join(''); }

// ================= 10. 初始化 =================
(async function() { await LocalCache.init(); applySettings(); renderBookList(); })();
</script>
